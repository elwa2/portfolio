<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>خزنتي — إدارة الخزنة اليومية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --canvas-base:#0d0d0f;
  --canvas-raised:#141416;
  --canvas-elevated:#1a1a1e;
  --canvas-overlay:#202024;

  --glass-subtle:rgba(255,255,255,0.03);
  --glass-moderate:rgba(255,255,255,0.06);
  --glass-strong:rgba(255,255,255,0.10);
  --glass-border:rgba(255,255,255,0.08);

  --text-primary:#f0ede8;
  --text-secondary:#9b9693;
  --text-tertiary:#5c5855;

  --accent-primary:#e8734a;
  --accent-warm:#d4a843;
  --accent-glow:rgba(232,115,74,0.15);

  --semantic-success:#4ade80;
  --semantic-warning:#fb923c;
  --semantic-danger:#f87171;

  --border-subtle:rgba(255,255,255,0.06);
  --border-default:rgba(255,255,255,0.10);
  --border-strong:rgba(255,255,255,0.18);
  --border-accent:rgba(232,115,74,0.35);

  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px;
  --space-5:24px; --space-6:32px; --space-7:48px; --space-8:64px;

  --shadow-sm:0 2px 8px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 4px 20px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.35);
  --glow-accent:0 0 24px rgba(232,115,74,0.25), 0 0 8px rgba(232,115,74,0.15);
}

*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Cairo',sans-serif;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,115,74,0.06), transparent),
    var(--canvas-base);
  color:var(--text-primary);
  min-height:100vh;
  direction:rtl;
  -webkit-font-smoothing:antialiased;
}
.num{font-family:'JetBrains Mono',monospace;}

.shell{max-width:1180px; margin:0 auto; display:flex; min-height:100vh;}

/* ===== Sidebar (desktop) ===== */
.sidebar{
  width:248px; flex-shrink:0; padding:var(--space-5) var(--space-4);
  border-inline-start:1px solid var(--border-subtle);
  display:none; flex-direction:column; gap:var(--space-6);
  position:sticky; top:0; height:100vh;
}
.brand{display:flex; align-items:center; gap:var(--space-3); padding:0 var(--space-2);}
.brand-mark{
  width:40px; height:40px; border-radius:12px; flex-shrink:0;
  background:linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1.15rem; color:#1a0e08;
  box-shadow:0 4px 16px rgba(232,115,74,0.35);
}
.brand-name{font-weight:800; font-size:1.05rem; letter-spacing:-0.01em;}
.brand-sub{font-size:0.7rem; color:var(--text-tertiary); margin-top:1px;}

.side-nav{display:flex; flex-direction:column; gap:var(--space-1);}
.side-item{
  display:flex; align-items:center; gap:var(--space-3);
  padding:var(--space-3) var(--space-3);
  border-radius:12px; border:1px solid transparent; background:transparent;
  color:var(--text-secondary); font-family:'Cairo',sans-serif;
  font-size:0.88rem; font-weight:600; cursor:pointer; text-align:right;
  transition:all 0.18s cubic-bezier(0.4,0,0.2,1); position:relative;
}
.side-item svg{width:19px; height:19px; flex-shrink:0; opacity:0.85;}
.side-item:hover{background:var(--glass-subtle); color:var(--text-primary);}
.side-item.active{
  background:var(--glass-strong); color:var(--text-primary);
  border-color:var(--border-accent); box-shadow:var(--glow-accent);
}
.side-item.active svg{opacity:1; color:var(--accent-primary);}

.main-col{flex:1; min-width:0; padding:var(--space-4) var(--space-4) 110px;}

/* ===== Bottom Nav (mobile) ===== */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  display:flex; background:rgba(20,20,22,0.9);
  backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--border-subtle);
  padding:var(--space-2) var(--space-1) calc(var(--space-2) + env(safe-area-inset-bottom));
}
.bottom-item{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:transparent; border:none; color:var(--text-tertiary);
  padding:var(--space-1) 2px; cursor:pointer; font-family:'Cairo',sans-serif;
  transition:color 0.18s ease;
}
.bottom-item svg{width:21px; height:21px; transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1);}
.bottom-item span{font-size:0.62rem; font-weight:600;}
.bottom-item.active{color:var(--accent-primary);}
.bottom-item.active svg{transform:translateY(-2px);}

/* ===== FAB ===== */
.fab{
  position:fixed; bottom:76px; left:50%; transform:translateX(-50%);
  width:56px; height:56px; border-radius:50%; z-index:110;
  background:linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
  border:none; color:#1a0e08; font-size:1.6rem; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; line-height:0;
  box-shadow:0 6px 24px rgba(232,115,74,0.45), 0 2px 8px rgba(0,0,0,0.3);
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.fab:active{transform:translateX(-50%) scale(0.92);}
.fab.hide{display:none;}

@media (min-width:900px){
  .sidebar{display:flex;}
  .bottom-nav{display:none;}
  .fab{display:none;}
  .main-col{padding:var(--space-6) var(--space-6) var(--space-6);}
}
@media (max-width:899px){
  .main-col{max-width:640px; margin:0 auto; width:100%;}
}

/* ===== Header / Balance ===== */
.topbar{
  background:linear-gradient(160deg, var(--glass-strong), var(--glass-subtle));
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--glass-border);
  border-radius:22px;
  box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.06);
  padding:var(--space-6) var(--space-5);
  margin-bottom:var(--space-5);
  position:relative;
  overflow:hidden;
}
.topbar::before{
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(circle at 100% 0%, rgba(232,115,74,0.1), transparent 60%);
  pointer-events:none;
}
.topbar::after{
  content:'';
  position:absolute; top:-40%; left:-10%; width:60%; height:180%;
  background:radial-gradient(circle, rgba(212,168,67,0.08), transparent 70%);
  pointer-events:none;
}
.topbar .label{
  font-size:0.75rem; color:var(--text-tertiary); font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase; margin-bottom:var(--space-2);
  display:flex; align-items:center; gap:6px;
}
.topbar .label .pulse{
  width:7px; height:7px; border-radius:50%; background:var(--semantic-success);
  box-shadow:0 0 8px rgba(74,222,128,0.6); animation:glowPulse 2s ease-in-out infinite;
}
.topbar .balance{
  font-size:2.8rem; font-weight:800; letter-spacing:-0.03em;
  display:flex; align-items:baseline; gap:var(--space-2); position:relative; z-index:1;
}
.topbar .balance .unit{font-size:1.05rem; font-weight:600; color:var(--text-secondary);}
.topbar .sub{
  display:flex; gap:var(--space-3); margin-top:var(--space-5); flex-wrap:wrap; position:relative; z-index:1;
}
.topbar .sub .item{
  display:flex; flex-direction:column; gap:3px; background:var(--glass-subtle);
  border:1px solid var(--border-subtle); border-radius:12px; padding:var(--space-3) var(--space-4); flex:1; min-width:110px;
}
.topbar .sub .item .k{font-size:0.68rem; color:var(--text-tertiary); font-weight:600;}
.topbar .sub .item .v{font-size:1.05rem; font-weight:700;}
.v.in{color:var(--semantic-success);}
.v.out{color:var(--semantic-danger);}

@keyframes glowPulse{0%,100%{box-shadow:0 0 6px rgba(74,222,128,0.4);} 50%{box-shadow:0 0 14px rgba(74,222,128,0.7);}}

/* ===== Panels ===== */
.panel{
  background:var(--glass-subtle);
  border:1px solid var(--glass-border);
  border-radius:16px;
  padding:var(--space-5);
  margin-bottom:var(--space-4);
  animation:fadeSlideUp 0.35s cubic-bezier(0.4,0,0.2,1) both;
}
.panel h2{font-size:1.05rem; font-weight:700; margin-bottom:var(--space-4); display:flex; align-items:center; gap:var(--space-2);}
.panel h2 .dot{width:8px; height:8px; border-radius:50%; background:var(--accent-primary); box-shadow:var(--glow-accent);}

@keyframes fadeSlideUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0; transform:scale(0.95);} to{opacity:1; transform:scale(1);}}

/* ===== Form elements ===== */
.field{margin-bottom:var(--space-4);}
.field label{display:block; font-size:0.8rem; color:var(--text-secondary); font-weight:600; margin-bottom:var(--space-2);}
.field input, .field select, .field textarea{
  width:100%; background:var(--canvas-elevated);
  border:1px solid var(--border-default); border-radius:10px;
  padding:var(--space-3) var(--space-4); color:var(--text-primary);
  font-family:'Cairo',sans-serif; font-size:0.95rem;
  transition:border-color 0.2s ease;
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:none; border-color:var(--border-accent); box-shadow:0 0 0 3px var(--accent-glow);
}
.field input.num-input{font-family:'JetBrains Mono',monospace; font-size:1.1rem;}

.type-toggle{display:flex; gap:var(--space-3); margin-bottom:var(--space-4);}
.type-btn{
  flex:1; padding:var(--space-4); border-radius:12px;
  border:1.5px solid var(--border-default); background:var(--canvas-raised);
  color:var(--text-secondary); font-family:'Cairo',sans-serif; font-weight:700;
  font-size:0.95rem; cursor:pointer; transition:all 0.2s ease;
  display:flex; align-items:center; justify-content:center; gap:var(--space-2);
}
.type-btn[data-type="in"].active{
  border-color:rgba(74,222,128,0.5); background:rgba(74,222,128,0.1); color:var(--semantic-success);
  box-shadow:0 0 20px rgba(74,222,128,0.15);
}
.type-btn[data-type="out"].active{
  border-color:rgba(248,113,113,0.5); background:rgba(248,113,113,0.1); color:var(--semantic-danger);
  box-shadow:0 0 20px rgba(248,113,113,0.15);
}

.btn-primary{
  width:100%; background:var(--accent-primary); color:#fff;
  padding:var(--space-4); border-radius:12px; font-weight:700; font-size:0.95rem;
  border:none; cursor:pointer; font-family:'Cairo',sans-serif;
  transition:all 0.2s cubic-bezier(0.4,0,0.2,1); box-shadow:0 2px 12px rgba(232,115,74,0.3);
}
.btn-primary:hover{transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,115,74,0.45); filter:brightness(1.08);}
.btn-primary:active{transform:translateY(0) scale(0.98);}
.btn-ghost{
  background:transparent; border:1px solid var(--border-default); color:var(--text-secondary);
  padding:var(--space-2) var(--space-4); border-radius:10px; font-family:'Cairo',sans-serif;
  font-size:0.82rem; font-weight:600; cursor:pointer; transition:all 0.2s ease;
}
.btn-ghost:hover{background:var(--glass-subtle); color:var(--text-primary); border-color:var(--border-strong);}
.btn-danger-ghost{
  background:transparent; border:1px solid rgba(248,113,113,0.3); color:var(--semantic-danger);
  padding:var(--space-2) var(--space-3); border-radius:8px; font-family:'Cairo',sans-serif;
  font-size:0.78rem; font-weight:600; cursor:pointer; transition:all 0.2s ease;
}
.btn-danger-ghost:hover{background:rgba(248,113,113,0.1);}

/* ===== Entry list ===== */
.entry-row{
  display:flex; align-items:center; gap:var(--space-3);
  padding:var(--space-3) var(--space-2); border-radius:12px;
  border:1px solid var(--border-subtle); margin-bottom:var(--space-2);
  background:var(--canvas-raised); transition:all 0.15s ease;
}
.entry-row:hover{border-color:var(--border-default); background:var(--canvas-elevated);}
.entry-icon{
  width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1.1rem; flex-shrink:0;
}
.entry-icon.in{background:rgba(74,222,128,0.12); color:var(--semantic-success);}
.entry-icon.out{background:rgba(248,113,113,0.12); color:var(--semantic-danger);}
.entry-mid{flex:1; min-width:0;}
.entry-note{font-size:0.9rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.entry-time{font-size:0.72rem; color:var(--text-tertiary); margin-top:2px;}
.entry-amount{font-weight:700; font-size:1rem; flex-shrink:0;}
.entry-actions{display:flex; gap:var(--space-1); flex-shrink:0;}
.icon-btn{
  width:30px; height:30px; border-radius:8px; border:1px solid var(--border-subtle);
  background:transparent; color:var(--text-tertiary); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:0.85rem;
  transition:all 0.15s ease;
}
.icon-btn:hover{background:var(--glass-subtle); color:var(--text-primary); border-color:var(--border-default);}

.empty-state{
  text-align:center; padding:var(--space-7) var(--space-4); color:var(--text-tertiary);
}
.empty-state .icon{font-size:2rem; margin-bottom:var(--space-3); opacity:0.5;}
.empty-state .txt{font-size:0.9rem;}

/* ===== Reconciliation result ===== */
.recon-result{
  border-radius:14px; padding:var(--space-5); text-align:center; margin-top:var(--space-4);
  border:1.5px solid var(--border-default); background:var(--canvas-raised);
}
.recon-result.ok{border-color:rgba(74,222,128,0.4); background:rgba(74,222,128,0.06);}
.recon-result.diff-pos{border-color:rgba(212,168,67,0.4); background:rgba(212,168,67,0.06);}
.recon-result.diff-neg{border-color:rgba(248,113,113,0.4); background:rgba(248,113,113,0.06);}
.recon-result .status{font-size:1.15rem; font-weight:800; margin-bottom:var(--space-2);}
.recon-result .amount{font-size:1.8rem; font-weight:800;}

/* ===== Report cards ===== */
.stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-3); margin-bottom:var(--space-4);}
.stat-card{
  background:var(--canvas-raised); border:1px solid var(--border-subtle); border-radius:14px;
  padding:var(--space-4); text-align:center;
}
.stat-card .k{font-size:0.72rem; color:var(--text-tertiary); margin-bottom:var(--space-2); font-weight:600;}
.stat-card .v{font-size:1.15rem; font-weight:800;}

.day-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:var(--space-3); border-bottom:1px solid var(--border-subtle); font-size:0.88rem;
}
.day-row:last-child{border-bottom:none;}

/* ===== Customer chip & list ===== */
.cust-chip{
  display:inline-flex; align-items:center; gap:4px;
  background:var(--glass-moderate); border:1px solid var(--border-default);
  color:var(--text-secondary); font-size:0.7rem; font-weight:600;
  padding:2px 8px; border-radius:100px; cursor:pointer; transition:all 0.15s ease;
}
.cust-chip:hover{background:var(--glass-strong); color:var(--text-primary); border-color:var(--border-accent);}

.customer-row{
  display:flex; align-items:center; gap:var(--space-3);
  padding:var(--space-4); border-radius:12px; border:1px solid var(--border-subtle);
  margin-bottom:var(--space-2); background:var(--canvas-raised); cursor:pointer;
  transition:all 0.15s ease;
}
.customer-row:hover{border-color:var(--border-accent); background:var(--canvas-elevated);}
.customer-avatar{
  width:42px; height:42px; border-radius:50%; background:var(--glass-strong);
  display:flex; align-items:center; justify-content:center; font-weight:800;
  color:var(--accent-primary); flex-shrink:0; font-size:1.05rem;
}
.customer-info{flex:1; min-width:0;}
.customer-info .name{font-weight:700; font-size:0.95rem;}
.customer-info .meta{font-size:0.75rem; color:var(--text-tertiary); margin-top:2px;}
.customer-net{font-weight:800; font-size:1rem; flex-shrink:0;}

.back-link{
  display:inline-flex; align-items:center; gap:6px; color:var(--text-secondary);
  font-size:0.85rem; font-weight:600; cursor:pointer; margin-bottom:var(--space-4);
  transition:color 0.15s ease;
}
.back-link:hover{color:var(--text-primary);}

/* ===== Sheet (Excel-style grid) ===== */
.sheet-table{width:100%; border-collapse:collapse; font-size:0.85rem; background:var(--canvas-raised);}
.sheet-table thead th{
  background:var(--canvas-elevated); color:var(--text-secondary); font-weight:700;
  font-size:0.7rem; padding:var(--space-3) var(--space-2); text-align:center;
  border-bottom:1px solid var(--border-default); white-space:nowrap;
}
.sheet-table td{
  border-bottom:1px solid var(--border-subtle); border-inline-end:1px solid var(--border-subtle);
  padding:0; vertical-align:middle;
}
.sheet-table tbody tr:hover{background:var(--glass-subtle);}
.sheet-idx{
  text-align:center; color:var(--text-tertiary); font-size:0.72rem;
  font-family:'JetBrains Mono',monospace; padding:0 var(--space-2) !important;
}
.grid-cell{
  width:100%; background:transparent; border:1.5px solid transparent; border-radius:0;
  padding:10px 12px; color:var(--text-primary); font-family:'Cairo',sans-serif; font-size:0.85rem;
}
.grid-cell:focus{
  outline:none; background:var(--canvas-elevated); border-color:var(--border-accent);
  box-shadow:inset 0 0 0 1px var(--accent-glow); position:relative; z-index:2;
}
.grid-amount{font-family:'JetBrains Mono',monospace; text-align:left; direction:ltr;}
.grid-select{cursor:pointer;}
.sheet-table tfoot td{padding:var(--space-3) var(--space-4); border-top:2px solid var(--border-default); font-size:0.85rem;}
.sheet-del{opacity:0.45; margin:0 auto; display:flex;}
.sheet-del:hover{opacity:1; color:var(--semantic-danger); border-color:rgba(248,113,113,0.4);}
.sheet-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-4); flex-wrap:wrap; gap:var(--space-3);}

/* ===== Toast ===== */
#toast-container{position:fixed; bottom:110px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center;}
.toast{
  background:var(--canvas-elevated); border:1px solid var(--border-accent);
  color:var(--text-primary); padding:var(--space-3) var(--space-5); border-radius:12px;
  font-size:0.85rem; font-weight:600; box-shadow:var(--shadow-lg); animation:scaleIn 0.25s ease;
  white-space:nowrap;
}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; z-index:300; padding:var(--space-4);
  animation:scaleIn 0.2s ease;
}
.modal-box{
  background:var(--canvas-elevated); border:1px solid var(--border-default);
  border-radius:18px; padding:var(--space-5); width:100%; max-width:400px;
  box-shadow:var(--shadow-xl,var(--shadow-lg));
}
.modal-box h3{font-size:1rem; font-weight:700; margin-bottom:var(--space-4);}
.modal-actions{display:flex; gap:var(--space-3); margin-top:var(--space-4);}
.modal-actions .btn-primary, .modal-actions .btn-ghost{flex:1;}

/* Settings */
.setting-row{
  display:flex; justify-content:space-between; align-items:center; gap:var(--space-3);
  padding:var(--space-4) 0; border-bottom:1px solid var(--border-subtle);
}
.setting-row:last-child{border-bottom:none;}
.setting-row .txt{flex:1;}
.setting-row .txt .t{font-weight:600; font-size:0.9rem;}
.setting-row .txt .d{font-size:0.75rem; color:var(--text-tertiary); margin-top:2px;}

input[type="file"]{display:none;}

@media (min-width:640px){
  .stat-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">خ</div>
      <div>
        <div class="brand-name">خزنتي</div>
        <div class="brand-sub">إدارة الخزنة اليومية</div>
      </div>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
  </aside>
  <div class="main-col">
    <div class="topbar" id="topbar"></div>
    <main id="content"></main>
  </div>
</div>
<button class="fab" id="fabBtn" aria-label="قيد سريع">+</button>
<nav class="bottom-nav" id="bottomNav"></nav>
<datalist id="customerNamesList"></datalist>
<div id="toast-container"></div>
<div id="modal-root"></div>

<script>
(function(){
  "use strict";

  /* ===================== STORAGE ===================== */
  const STORAGE_KEY = "khazna_v1_state";
  const APP_VERSION = "1.6.0";

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return { openingBalance:0, transactions:[], reconciliations:[], customers:[] };
      const parsed = JSON.parse(raw);
      return {
        openingBalance: parsed.openingBalance || 0,
        transactions: parsed.transactions || [],
        reconciliations: parsed.reconciliations || [],
        customers: parsed.customers || []
      };
    }catch(e){
      console.error("تعذر قراءة البيانات المحفوظة", e);
      return { openingBalance:0, transactions:[], reconciliations:[], customers:[] };
    }
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      console.error("تعذر حفظ البيانات", e);
      showToast("⚠️ حصل خطأ في الحفظ، جرب تاني");
    }
  }

  let state = loadState();
  const ACTIVE_TAB_KEY = "khazna_active_tab_v1";
  function loadActiveTab(){
    try{ return localStorage.getItem(ACTIVE_TAB_KEY) || "quick"; }catch(e){ return "quick"; }
  }
  function setActiveTab(tabId){
    activeTab = tabId;
    try{ localStorage.setItem(ACTIVE_TAB_KEY, tabId); }catch(e){}
  }
  let activeTab = loadActiveTab();
  let journalDate = todayStr();
  let reconDate = todayStr();
  let selectedCustomerId = null;
  let customerSearchQuery = "";

  /* ===================== SHEET (Excel-style bulk entry) DRAFT ===================== */
  const SHEET_DRAFT_KEY = "khazna_sheet_draft_v1";
  function makeEmptySheetRows(n){
    const arr = [];
    for(let i=0;i<n;i++) arr.push({id:uid(), date:todayStr(), type:'in', amount:'', note:'', customer:'', transactionId:null});
    return arr;
  }
  function loadSheetDraft(){
    try{
      const raw = localStorage.getItem(SHEET_DRAFT_KEY);
      if(raw){
        const arr = JSON.parse(raw);
        if(Array.isArray(arr) && arr.length) return arr;
      }
    }catch(e){ /* تجاهل واستخدم صفوف فاضية */ }
    return makeEmptySheetRows(6);
  }
  function saveSheetDraft(){
    try{ localStorage.setItem(SHEET_DRAFT_KEY, JSON.stringify(sheetRows)); }catch(e){}
  }
  let sheetRows = loadSheetDraft();

  /* ===================== HELPERS ===================== */
  function todayStr(){
    const d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function fmt(n){
    const num = Number(n)||0;
    /* استخدام en-US لضمان فاصل آلاف ثابت وأرقام لاتينية واضحة حتى لو تصفح المستخدم بيدعم أرقام عربية شرقية */
    return num.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:2});
  }

  /* تنسيق المبلغ بفاصل آلاف وهو لسه بيتكتب (زي جوجل شيت بالظبط) */
  function formatMoneyLive(raw){
    const str = (raw||'').toString();
    const neg = str.trim().startsWith('-');
    let cleaned = str.replace(/[^0-9.]/g,'');
    const firstDot = cleaned.indexOf('.');
    if(firstDot!==-1){
      cleaned = cleaned.slice(0,firstDot+1) + cleaned.slice(firstDot+1).replace(/\./g,'');
    }
    let [intPart, decPart] = cleaned.split('.');
    intPart = (intPart||'').replace(/^0+(?=\d)/,'');
    const withCommas = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return (neg?'-':'') + withCommas + (decPart!==undefined ? '.'+decPart : (cleaned.endsWith('.') ? '.' : ''));
  }
  function parseMoneyString(str){
    return parseFloat((str||'').toString().replace(/,/g,'')) || 0;
  }
  /* بيحسب عدد "الحروف المهمة" (أرقام + إشارة السالب في الأول) قبل نقطة معينة */
  function countMoneyChars(str, uptoIndex){
    let count = 0;
    const limit = Math.min(uptoIndex, str.length);
    for(let i=0;i<limit;i++){
      const ch = str[i];
      if(/[0-9.]/.test(ch)) count++;
      else if(ch==='-' && i===0) count++;
    }
    return count;
  }
  /* بيلاقي مكان المؤشر الصح في النص بعد التنسيق، بحيث ميرجعش لقبل إشارة السالب */
  function findMoneyCursorPos(formatted, targetCount){
    let count=0, pos=0;
    while(pos<formatted.length && count<targetCount){
      const ch = formatted[pos];
      if(/[0-9.]/.test(ch) || (ch==='-' && pos===0)) count++;
      pos++;
    }
    return pos;
  }
  /* يربط أي حقل إدخال مبلغ بتنسيق الفاصل الحي مع الحفاظ على موضع المؤشر */
  function attachMoneyFormatting(inputEl){
    if(!inputEl) return;
    inputEl.addEventListener('input', ()=>{
      const cursorPos = inputEl.selectionStart;
      const before = inputEl.value;
      const targetCount = countMoneyChars(before, cursorPos);
      const formatted = formatMoneyLive(before);
      inputEl.value = formatted;
      const pos = findMoneyCursorPos(formatted, targetCount);
      inputEl.setSelectionRange(pos,pos);
    });
  }
  function fmtDate(dstr){
    const d = new Date(dstr+"T00:00:00");
    const days = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
    return days[d.getDay()] + " " + d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear();
  }
  function fmtTime(iso){
    const d = new Date(iso);
    return d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
  }
  function escapeHtml(s){
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function showToast(msg){
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(()=>{ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2200);
  }

  /* balance up to & including a given date (inclusive) */
  function balanceUpTo(dateStr){
    let bal = Number(state.openingBalance)||0;
    for(const tx of state.transactions){
      if(tx.date <= dateStr){
        bal += tx.type === 'in' ? Number(tx.amount) : -Number(tx.amount);
      }
    }
    return bal;
  }
  function currentBalance(){ return balanceUpTo("9999-12-31"); }

  function totalsForDate(dateStr){
    let inTotal=0, outTotal=0;
    for(const tx of state.transactions){
      if(tx.date === dateStr){
        if(tx.type==='in') inTotal += Number(tx.amount);
        else outTotal += Number(tx.amount);
      }
    }
    return {inTotal, outTotal};
  }

  function totalsForRange(startStr, endStr){
    let inTotal=0, outTotal=0;
    for(const tx of state.transactions){
      if(tx.date >= startStr && tx.date <= endStr){
        if(tx.type==='in') inTotal += Number(tx.amount);
        else outTotal += Number(tx.amount);
      }
    }
    return {inTotal, outTotal};
  }

  function addDays(dateStr, n){
    const d = new Date(dateStr+"T00:00:00");
    d.setDate(d.getDate()+n);
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }

  /* ===================== CUSTOMERS ===================== */
  function findCustomerByName(name){
    const clean = (name||'').trim().toLowerCase();
    if(!clean) return null;
    return state.customers.find(c=>c.name.trim().toLowerCase()===clean) || null;
  }
  function getOrCreateCustomerId(name){
    const clean = (name||'').trim();
    if(!clean) return null;
    const existing = findCustomerByName(clean);
    if(existing) return existing.id;
    const c = { id: uid(), name: clean, createdAt: new Date().toISOString() };
    state.customers.push(c);
    return c.id;
  }
  function getCustomerById(id){
    return state.customers.find(c=>c.id===id) || null;
  }
  function customerTransactions(customerId){
    return state.transactions
      .filter(tx=>tx.customerId===customerId)
      .sort((a,b)=> (a.date+a.createdAt).localeCompare(b.date+b.createdAt));
  }
  function customerTotals(customerId){
    let inTotal=0, outTotal=0;
    for(const tx of state.transactions){
      if(tx.customerId===customerId){
        if(tx.type==='in') inTotal += Number(tx.amount);
        else outTotal += Number(tx.amount);
      }
    }
    return {inTotal, outTotal, net: inTotal-outTotal};
  }
  function renderCustomerDatalist(){
    const dl = document.getElementById('customerNamesList');
    if(!dl) return;
    dl.innerHTML = state.customers
      .slice().sort((a,b)=>a.name.localeCompare(b.name,'ar'))
      .map(c=>`<option value="${escapeHtml(c.name)}"></option>`).join('');
  }
  function customerChip(customerId){
    const c = getCustomerById(customerId);
    if(!c) return '';
    return `<span class="cust-chip" data-open-customer="${c.id}">👤 ${escapeHtml(c.name)}</span>`;
  }
  function bindCustomerChipClicks(containerId){
    const container = document.getElementById(containerId);
    if(!container) return;
    container.querySelectorAll('[data-open-customer]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        selectedCustomerId = el.dataset.openCustomer;
        setActiveTab('customers');
        renderAll();
      });
    });
  }

  /* ===================== RENDER: TOPBAR ===================== */
  function renderTopbar(){
    const bal = currentBalance();
    const t = totalsForDate(todayStr());
    const el = document.getElementById('topbar');
    el.innerHTML = `
      <div class="label"><span class="pulse"></span> رصيد الخزنة الحالي</div>
      <div class="balance"><span class="num">${fmt(bal)}</span><span class="unit">ج.م</span></div>
      <div class="sub">
        <div class="item"><span class="k">وارد النهاردة</span><span class="v in num">+${fmt(t.inTotal)}</span></div>
        <div class="item"><span class="k">منصرف النهاردة</span><span class="v out num">-${fmt(t.outTotal)}</span></div>
        <div class="item"><span class="k">صافي النهاردة</span><span class="v num">${fmt(t.inTotal - t.outTotal)}</span></div>
      </div>
    `;
  }

  /* ===================== TABS ===================== */
  const ICONS = {
    quick: '<path d="M13 2 3 14h7l-1 8 10-12h-7z"/>',
    sheet: '<rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M3 15.5h18M9 4v16M15 4v16"/>',
    journal: '<path d="M4 5a2 2 0 0 1 2-2h5v18H6a2 2 0 0 1-2-2z"/><path d="M20 5a2 2 0 0 0-2-2h-5v18h5a2 2 0 0 0 2-2z"/>',
    customers: '<circle cx="9" cy="8" r="3"/><path d="M2.5 20c0-3.6 2.9-6.2 6.5-6.2s6.5 2.6 6.5 6.2"/><circle cx="17" cy="8.5" r="2.3"/><path d="M15.3 13.9c2.6.2 4.8 2.1 5.7 4.6"/>',
    recon: '<rect x="5" y="11" width="14" height="9" rx="2.5"/><path d="M8 11V7.5a4 4 0 0 1 8 0V11"/>',
    reports: '<path d="M4 20V11"/><path d="M11 20V4"/><path d="M18 20v-6.5"/>',
    settings: '<circle cx="12" cy="12" r="3"/><path d="M12 3v2.5M12 18.5V21M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M3 12h2.5M18.5 12H21M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"/>'
  };
  const TABS = [
    {id:'quick', label:'قيد سريع', short:'قيد'},
    {id:'sheet', label:'تسجيل اليومية', short:'الشيت'},
    {id:'journal', label:'دفتر اليومية', short:'اليومية'},
    {id:'customers', label:'العملاء', short:'العملاء'},
    {id:'recon', label:'جرد الخزنة', short:'الجرد'},
    {id:'reports', label:'التقارير', short:'تقارير'},
    {id:'settings', label:'الإعدادات', short:'إعدادات'}
  ];
  function svgIcon(tabId){
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[tabId]}</svg>`;
  }

  function selectTab(tabId){
    setActiveTab(tabId);
    if(activeTab==='customers') selectedCustomerId = null;
    renderAll();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function renderTabbar(){
    const side = document.getElementById('sideNav');
    side.innerHTML = TABS.map(t=>`
      <button class="side-item ${activeTab===t.id?'active':''}" data-tab="${t.id}">
        ${svgIcon(t.id)}<span>${t.label}</span>
      </button>`).join('');
    side.querySelectorAll('.side-item').forEach(b=>{
      b.addEventListener('click', ()=> selectTab(b.dataset.tab));
    });

    const bottom = document.getElementById('bottomNav');
    bottom.innerHTML = TABS.map(t=>`
      <button class="bottom-item ${activeTab===t.id?'active':''}" data-tab="${t.id}">
        ${svgIcon(t.id)}<span>${t.short}</span>
      </button>`).join('');
    bottom.querySelectorAll('.bottom-item').forEach(b=>{
      b.addEventListener('click', ()=> selectTab(b.dataset.tab));
    });

    const fab = document.getElementById('fabBtn');
    fab.classList.toggle('hide', activeTab==='quick');
    fab.onclick = ()=>{
      selectTab('quick');
      setTimeout(()=>{ const el=document.getElementById('qAmount'); if(el) el.focus(); }, 150);
    };
  }

  /* ===================== VIEW: QUICK ENTRY ===================== */
  let quickType = 'in';
  function renderQuick(){
    const todayTx = state.transactions
      .filter(tx=>tx.date===todayStr())
      .sort((a,b)=>b.createdAt.localeCompare(a.createdAt));

    return `
    <div class="panel">
      <h2><span class="dot"></span> إضافة عملية جديدة</h2>
      <div class="type-toggle">
        <button class="type-btn ${quickType==='in'?'active':''}" data-type="in">💰 وارد (فلوس داخلة)</button>
        <button class="type-btn ${quickType==='out'?'active':''}" data-type="out">📤 منصرف (فلوس خارجة)</button>
      </div>
      <div class="field">
        <label>المبلغ (ج.م)</label>
        <input type="text" inputmode="decimal" class="num-input" id="qAmount" placeholder="0.00">
      </div>
      <div class="field">
        <label>البيان / السبب</label>
        <input type="text" id="qNote" placeholder="مثال: تحصيل فاتورة عميل / مصاريف مكتبية">
      </div>
      <div class="field">
        <label>العميل (اختياري)</label>
        <input type="text" id="qCustomer" list="customerNamesList" placeholder="اكتب اسم العميل — لو جديد هيتسجل تلقائي">
      </div>
      <button class="btn-primary" id="qSubmit">إضافة القيد</button>
    </div>

    <div class="panel">
      <h2><span class="dot"></span> قيود النهاردة (${fmtDate(todayStr())})</h2>
      <div id="qList">${renderEntryList(todayTx)}</div>
    </div>
    `;
  }

  function renderEntryList(list, showDate){
    if(list.length===0){
      return `<div class="empty-state"><div class="icon">🗒️</div><div class="txt">لسه معملتش أي قيد</div></div>`;
    }
    return list.map(tx=>`
      <div class="entry-row" data-id="${tx.id}">
        <div class="entry-icon ${tx.type}">${tx.type==='in'?'↓':'↑'}</div>
        <div class="entry-mid">
          <div class="entry-note">${escapeHtml(tx.note || (tx.type==='in'?'وارد':'منصرف'))}</div>
          <div class="entry-time">${showDate ? fmtDate(tx.date)+' — ' : ''}${fmtTime(tx.createdAt)}${tx.customerId ? ' &nbsp; '+customerChip(tx.customerId) : ''}</div>
        </div>
        <div class="entry-amount num ${tx.type==='in'?'v in':'v out'}">${tx.type==='in'?'+':'-'}${fmt(tx.amount)}</div>
        <div class="entry-actions">
          <button class="icon-btn" data-action="edit" data-id="${tx.id}">✎</button>
          <button class="icon-btn" data-action="delete" data-id="${tx.id}">✕</button>
        </div>
      </div>
    `).join('');
  }

  function updateQuickTypeButtons(){
    document.querySelectorAll('.type-btn[data-type]').forEach(b=>{
      b.classList.toggle('active', b.dataset.type===quickType);
    });
  }

  function bindQuickEvents(){
    document.querySelectorAll('.type-btn[data-type]').forEach(b=>{
      b.addEventListener('click', ()=>{ quickType = b.dataset.type; updateQuickTypeButtons(); });
    });
    const submitBtn = document.getElementById('qSubmit');
    if(submitBtn){
      submitBtn.addEventListener('click', ()=>{
        const amountEl = document.getElementById('qAmount');
        const noteEl = document.getElementById('qNote');
        const customerEl = document.getElementById('qCustomer');
        let rawAmount = parseMoneyString(amountEl.value);
        if(!rawAmount || rawAmount===0){ showToast('⚠️ اكتب مبلغ صحيح'); amountEl.focus(); return; }
        /* كتابة رقم سالب معناها منصرف تلقائي، حتى لو الزرار شايل وارد */
        const finalType = rawAmount < 0 ? 'out' : quickType;
        const amount = Math.abs(rawAmount);
        const customerId = getOrCreateCustomerId(customerEl.value);
        state.transactions.push({
          id: uid(), date: todayStr(), type: finalType,
          amount: amount, note: noteEl.value.trim(), customerId: customerId,
          createdAt: new Date().toISOString()
        });
        saveState();
        showToast(finalType==='in' ? '✓ اتسجل الوارد' : '✓ اتسجل المنصرف');
        amountEl.value=''; noteEl.value=''; customerEl.value='';
        quickType = 'in';
        renderAll();
      });
      const amountEl = document.getElementById('qAmount');
      attachMoneyFormatting(amountEl);
      amountEl.addEventListener('input', ()=>{
        const v = parseMoneyString(amountEl.value);
        if(v<0){ quickType = 'out'; updateQuickTypeButtons(); }
      });
      amountEl.addEventListener('click', (e)=>{
        if(e.detail !== 3) return;
        openCalcModal(amountEl.value, (val)=>{
          amountEl.value = formatMoneyLive(String(val));
          if(val < 0){ quickType = 'out'; updateQuickTypeButtons(); }
          amountEl.focus();
        });
      });
    }
    bindEntryListActions('qList');
  }

  function bindEntryListActions(containerId){
    const container = document.getElementById(containerId);
    if(!container) return;
    bindCustomerChipClicks(containerId);
    container.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        confirmModal('حذف القيد', 'متأكد إنك عايز تحذف القيد ده؟ الإجراء ده مش هينعمله رجوع.', ()=>{
          state.transactions = state.transactions.filter(t=>t.id!==btn.dataset.id);
          saveState(); showToast('🗑️ اتحذف القيد'); renderAll();
        });
      });
    });
    container.querySelectorAll('[data-action="edit"]').forEach(btn=>{
      btn.addEventListener('click', ()=> openEditModal(btn.dataset.id) );
    });
  }

  /* ===================== EDIT MODAL ===================== */
  function openEditModal(id){
    const tx = state.transactions.find(t=>t.id===id);
    if(!tx) return;
    const root = document.getElementById('modal-root');
    root.innerHTML = `
      <div class="modal-overlay" id="editOverlay">
        <div class="modal-box">
          <h3>تعديل القيد</h3>
          <div class="type-toggle">
            <button class="type-btn ${tx.type==='in'?'active':''}" data-etype="in">💰 وارد</button>
            <button class="type-btn ${tx.type==='out'?'active':''}" data-etype="out">📤 منصرف</button>
          </div>
          <div class="field"><label>المبلغ</label><input type="text" inputmode="decimal" class="num-input" id="eAmount" value="${fmt(tx.amount)}"></div>
          <div class="field"><label>البيان</label><input type="text" id="eNote" value="${escapeHtml(tx.note||'')}"></div>
          <div class="field"><label>العميل (اختياري)</label><input type="text" id="eCustomer" list="customerNamesList" value="${escapeHtml(tx.customerId ? (getCustomerById(tx.customerId)||{}).name||'' : '')}"></div>
          <div class="field"><label>التاريخ</label><input type="date" id="eDate" value="${tx.date}"></div>
          <div class="modal-actions">
            <button class="btn-ghost" id="eCancel">إلغاء</button>
            <button class="btn-primary" id="eSave">حفظ التعديل</button>
          </div>
        </div>
      </div>
    `;
    let eType = tx.type;
    root.querySelectorAll('[data-etype]').forEach(b=>{
      b.addEventListener('click', ()=>{
        eType = b.dataset.etype;
        root.querySelectorAll('[data-etype]').forEach(x=>x.classList.toggle('active', x.dataset.etype===eType));
      });
    });
    document.getElementById('eCancel').addEventListener('click', ()=> root.innerHTML='');
    document.getElementById('editOverlay').addEventListener('click', (e)=>{ if(e.target.id==='editOverlay') root.innerHTML=''; });
    attachMoneyFormatting(document.getElementById('eAmount'));
    document.getElementById('eSave').addEventListener('click', ()=>{
      const amount = parseMoneyString(document.getElementById('eAmount').value);
      if(!amount || amount<=0){ showToast('⚠️ اكتب مبلغ صحيح'); return; }
      tx.amount = amount;
      tx.note = document.getElementById('eNote').value.trim();
      tx.customerId = getOrCreateCustomerId(document.getElementById('eCustomer').value);
      tx.date = document.getElementById('eDate').value || tx.date;
      tx.type = eType;
      saveState(); root.innerHTML=''; showToast('✓ اتحفظ التعديل'); renderAll();
    });
  }

  function confirmModal(title, msg, onConfirm){
    const root = document.getElementById('modal-root');
    root.innerHTML = `
      <div class="modal-overlay" id="confOverlay">
        <div class="modal-box">
          <h3>${title}</h3>
          <p style="color:var(--text-secondary); font-size:0.88rem; line-height:1.6;">${msg}</p>
          <div class="modal-actions">
            <button class="btn-ghost" id="confCancel">إلغاء</button>
            <button class="btn-primary" id="confYes" style="background:var(--semantic-danger); box-shadow:none;">تأكيد الحذف</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('confCancel').addEventListener('click', ()=> root.innerHTML='');
    document.getElementById('confOverlay').addEventListener('click', (e)=>{ if(e.target.id==='confOverlay') root.innerHTML=''; });
    document.getElementById('confYes').addEventListener('click', ()=>{ root.innerHTML=''; onConfirm(); });
  }

  /* ===================== VIEW: SHEET (Excel-style bulk entry) ===================== */
  function sheetRowHtml(r, displayIndex){
    return `
    <tr data-row-id="${r.id}">
      <td class="sheet-idx">${displayIndex+1}</td>
      <td><input type="date" class="grid-cell" data-row-id="${r.id}" data-field="date" value="${r.date}"></td>
      <td>
        <select class="grid-cell grid-select" data-row-id="${r.id}" data-field="type">
          <option value="in" ${r.type==='in'?'selected':''}>وارد</option>
          <option value="out" ${r.type==='out'?'selected':''}>منصرف</option>
        </select>
      </td>
      <td><input type="text" inputmode="decimal" class="grid-cell grid-amount" data-row-id="${r.id}" data-field="amount" value="${escapeHtml(r.amount)}" placeholder="0.00"></td>
      <td><input type="text" class="grid-cell" data-row-id="${r.id}" data-field="note" value="${escapeHtml(r.note)}" placeholder="البيان..."></td>
      <td><input type="text" class="grid-cell" data-row-id="${r.id}" data-field="customer" list="customerNamesList" value="${escapeHtml(r.customer)}" placeholder="اسم العميل..."></td>
      <td><button class="icon-btn sheet-del" data-row-id="${r.id}" title="حذف الصف">✕</button></td>
    </tr>`;
  }

  function renderSheet(){
    return `
    <div class="panel" style="padding:var(--space-4);">
      <div class="sheet-toolbar">
        <h2 style="margin:0;"><span class="dot"></span> تسجيل اليومية — جدول سريع</h2>
        <div style="display:flex; gap:8px;">
          <button class="btn-ghost" id="sheetAddRow">+ إضافة صف</button>
          <button class="btn-primary" id="sheetClear" style="width:auto; padding:10px 22px;">🧹 يومية جديدة</button>
        </div>
      </div>
      <div style="overflow-x:auto; border:1px solid var(--border-subtle); border-radius:12px;">
        <table class="sheet-table" id="sheetTable">
          <thead>
            <tr>
              <th style="width:32px;">#</th>
              <th style="min-width:130px;">التاريخ</th>
              <th style="width:90px;">النوع</th>
              <th style="min-width:130px;">المبلغ</th>
              <th style="min-width:180px;">البيان</th>
              <th style="min-width:160px;">العميل</th>
              <th style="width:34px;"></th>
            </tr>
          </thead>
          <tbody id="sheetBody">
            ${sheetRows.map((r,i)=>sheetRowHtml(r,i)).join('')}
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3" style="text-align:start; font-weight:700; font-size:0.8rem; color:var(--text-tertiary);">الإجمالي</td>
              <td colspan="4">
                <span class="num" id="sheetTotalIn" style="color:var(--semantic-success); font-weight:700;">+0</span>
                &nbsp;/&nbsp;
                <span class="num" id="sheetTotalOut" style="color:var(--semantic-danger); font-weight:700;">-0</span>
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
      <div style="font-size:0.75rem; color:var(--text-tertiary); margin-top:var(--space-3); line-height:1.6;">
        اكتب البيانات صف بصف زي إكسل بالظبط — دوس <b>Enter</b> للانتقال للخلية اللي جنبها (ولو آخر خلية في الصف هينزلك لصف جديد تلقائي). أي مبلغ تكتبه <b>بيترحّل تلقائي</b> في دفتر اليومية على طول من غير ما تدوس أي زرار — واكتب رقم بإشارة سالب (-) عشان يتسجل منصرف تلقائي. دبل كليك على خانة المبلغ يفتحلك حاسبة سريعة. لما تخلص، دوس "🧹 يومية جديدة" عشان تنضّف الجدول وتبدأ صفوف فاضية (من غير ما يأثر على القيود اللي اترحّلت خلاص).
      </div>
    </div>
    `;
  }

  /* يرحّل صف الشيت تلقائياً كقيد فعلي في دفتر اليومية، أو يحدّث القيد لو كان موجود بالفعل */
  function syncRowToTransaction(row){
    const amt = Math.abs(parseMoneyString(row.amount));
    if(amt > 0){
      const customerId = getOrCreateCustomerId(row.customer);
      if(row.transactionId){
        const tx = state.transactions.find(t=>t.id===row.transactionId);
        if(tx){
          tx.date = row.date || todayStr();
          tx.type = row.type==='out' ? 'out' : 'in';
          tx.amount = amt;
          tx.note = (row.note||'').trim();
          tx.customerId = customerId;
        } else {
          const newTx = { id:uid(), date: row.date||todayStr(), type: row.type==='out'?'out':'in', amount:amt, note:(row.note||'').trim(), customerId, createdAt:new Date().toISOString() };
          state.transactions.push(newTx);
          row.transactionId = newTx.id;
        }
      } else {
        const newTx = { id:uid(), date: row.date||todayStr(), type: row.type==='out'?'out':'in', amount:amt, note:(row.note||'').trim(), customerId, createdAt:new Date().toISOString() };
        state.transactions.push(newTx);
        row.transactionId = newTx.id;
      }
      saveState();
    } else if(row.transactionId){
      state.transactions = state.transactions.filter(t=>t.id!==row.transactionId);
      row.transactionId = null;
      saveState();
    }
    saveSheetDraft();
  }

  /* حاسبة آمنة تسمح فقط بأرقام وعمليات حسابية بسيطة */
  function evalSafeMath(str){
    if(!str) return null;
    const cleaned = str.trim();
    if(!cleaned || !/^[0-9+\-*/(). ]+$/.test(cleaned)) return null;
    try{
      const val = Function('"use strict"; return ('+cleaned+')')();
      if(typeof val !== 'number' || !isFinite(val)) return null;
      return val;
    }catch(e){ return null; }
  }

  function openCalcModal(initialValue, onInsert){
    const root = document.getElementById('modal-root');
    root.innerHTML = `
      <div class="modal-overlay" id="calcOverlay">
        <div class="modal-box" style="max-width:320px;">
          <h3>حاسبة سريعة</h3>
          <div class="field">
            <input type="text" id="calcExpr" class="num-input" style="font-family:'JetBrains Mono',monospace; direction:ltr; text-align:left;" value="${escapeHtml(initialValue||'')}" placeholder="مثال: 15+15">
          </div>
          <div style="background:var(--canvas-raised); border:1px solid var(--border-subtle); border-radius:10px; padding:12px 16px; margin-bottom:var(--space-4); display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.8rem; color:var(--text-tertiary);">الناتج:</span>
            <span class="num" id="calcResult" style="font-size:1.2rem; font-weight:800;">0</span>
          </div>
          <div class="modal-actions">
            <button class="btn-ghost" id="calcCancel">إلغاء</button>
            <button class="btn-primary" id="calcInsert">إدراج</button>
          </div>
        </div>
      </div>
    `;
    const exprEl = document.getElementById('calcExpr');
    const resultEl = document.getElementById('calcResult');
    function recompute(){
      const val = evalSafeMath(exprEl.value);
      resultEl.textContent = val===null ? '—' : fmt(val);
    }
    recompute();
    exprEl.addEventListener('input', recompute);
    exprEl.focus(); exprEl.select();
    document.getElementById('calcCancel').addEventListener('click', ()=> root.innerHTML='');
    document.getElementById('calcOverlay').addEventListener('click', (e)=>{ if(e.target.id==='calcOverlay') root.innerHTML=''; });
    exprEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); document.getElementById('calcInsert').click(); } });
    document.getElementById('calcInsert').addEventListener('click', ()=>{
      const val = evalSafeMath(exprEl.value);
      if(val===null){ showToast('⚠️ اكتب عملية حسابية صحيحة'); return; }
      root.innerHTML='';
      onInsert(val);
    });
  }

  function bindSheetEvents(){
    const body = document.getElementById('sheetBody');
    if(!body) return;

    function findRow(id){ return sheetRows.find(r=>r.id===id); }
    function updateTotals(){
      let inT=0, outT=0;
      sheetRows.forEach(r=>{
        const v = parseMoneyString(r.amount);
        if(!v) return;
        if(r.type==='out') outT += Math.abs(v); else inT += v;
      });
      const inEl = document.getElementById('sheetTotalIn');
      const outEl = document.getElementById('sheetTotalOut');
      if(inEl) inEl.textContent = '+' + fmt(inT);
      if(outEl) outEl.textContent = '-' + fmt(outT);
    }
    updateTotals();

    body.addEventListener('input', (e)=>{
      const el = e.target;
      if(!el.classList.contains('grid-cell')) return;
      const row = findRow(el.dataset.rowId);
      if(!row) return;
      const field = el.dataset.field;
      if(field==='amount'){
        const cursorPos = el.selectionStart;
        const before = el.value;
        const targetCount = countMoneyChars(before, cursorPos);
        const formatted = formatMoneyLive(before);
        el.value = formatted;
        const pos = findMoneyCursorPos(formatted, targetCount);
        el.setSelectionRange(pos,pos);
        row.amount = formatted;
        /* كتابة رقم سالب معناها منصرف تلقائي */
        const parsedVal = parseMoneyString(formatted);
        if(parsedVal < 0){
          row.type = 'out';
          const selectEl = body.querySelector(`select[data-row-id="${row.id}"][data-field="type"]`);
          if(selectEl) selectEl.value = 'out';
        }
        updateTotals();
      } else {
        row[field] = el.value;
      }
      syncRowToTransaction(row);
    });

    body.addEventListener('change', (e)=>{
      const el = e.target;
      if(!el.classList.contains('grid-cell')) return;
      const row = findRow(el.dataset.rowId);
      if(!row) return;
      row[el.dataset.field] = el.value;
      if(el.dataset.field==='type') updateTotals();
      syncRowToTransaction(row);
    });

    /* ضغطة واحدة على أي خلية = تحديد كل النص اللي فيها على طول (زي إكسل بالظبط) */
    body.addEventListener('focusin', (e)=>{
      const el = e.target;
      if(el.classList && el.classList.contains('grid-cell') && typeof el.select==='function'){
        setTimeout(()=>{ el.select(); }, 0);
      }
    });

    /* حاسبة سريعة بـ 3 ضغطات على خانة المبلغ (مش ضغطتين) عشان متتعارضش مع تحديد النص */
    body.addEventListener('click', (e)=>{
      const el = e.target.closest('.grid-amount');
      if(!el || e.detail !== 3) return;
      const row = findRow(el.dataset.rowId);
      if(!row) return;
      openCalcModal(el.value, (val)=>{
        const formatted = formatMoneyLive(String(val));
        el.value = formatted;
        row.amount = formatted;
        if(val < 0){
          row.type = 'out';
          const selectEl = body.querySelector(`select[data-row-id="${row.id}"][data-field="type"]`);
          if(selectEl) selectEl.value = 'out';
        }
        updateTotals();
        syncRowToTransaction(row);
        el.focus();
      });
    });

    const SHEET_FIELD_ORDER = ['date','type','amount','note','customer'];
    body.addEventListener('keydown', (e)=>{
      if(e.key !== 'Enter') return;
      const el = e.target;
      if(!el.classList.contains('grid-cell')) return;
      e.preventDefault();
      const field = el.dataset.field;
      const rowId = el.dataset.rowId;
      const fieldIdx = SHEET_FIELD_ORDER.indexOf(field);

      if(fieldIdx !== -1 && fieldIdx < SHEET_FIELD_ORDER.length - 1){
        /* لسه في نص الصف: روح للخلية اللي جنبها على طول */
        const nextField = SHEET_FIELD_ORDER[fieldIdx+1];
        setTimeout(()=>{
          const nextEl = body.querySelector(`[data-row-id="${rowId}"][data-field="${nextField}"]`);
          if(nextEl){ nextEl.focus(); if(typeof nextEl.select==='function') nextEl.select(); }
        }, 0);
        return;
      }

      /* آخر خلية في الصف (العميل): انزل لأول خلية في الصف الجاي، وأضف صف جديد لو محتاج */
      const idx = sheetRows.findIndex(r=>r.id===rowId);
      if(idx===-1) return;
      let nextIdx = idx+1;
      if(nextIdx >= sheetRows.length){
        const newRow = {id:uid(), date:todayStr(), type:'in', amount:'', note:'', customer:'', transactionId:null};
        sheetRows.push(newRow);
        body.insertAdjacentHTML('beforeend', sheetRowHtml(newRow, sheetRows.length-1));
        saveSheetDraft();
      }
      const nextRow = sheetRows[nextIdx];
      setTimeout(()=>{
        const nextEl = body.querySelector(`[data-row-id="${nextRow.id}"][data-field="date"]`);
        if(nextEl){ nextEl.focus(); if(typeof nextEl.select==='function') nextEl.select(); }
      }, 0);
    });

    body.addEventListener('click', (e)=>{
      const btn = e.target.closest('.sheet-del');
      if(!btn) return;
      if(sheetRows.length<=1){ showToast('⚠️ لازم يفضل صف واحد على الأقل'); return; }
      const row = findRow(btn.dataset.rowId);
      if(row && row.transactionId){
        state.transactions = state.transactions.filter(t=>t.id!==row.transactionId);
        saveState();
      }
      sheetRows = sheetRows.filter(r=>r.id!==btn.dataset.rowId);
      saveSheetDraft();
      renderAll();
    });

    const addBtn = document.getElementById('sheetAddRow');
    if(addBtn) addBtn.addEventListener('click', ()=>{
      const newRow = {id:uid(), date:todayStr(), type:'in', amount:'', note:'', customer:'', transactionId:null};
      sheetRows.push(newRow);
      body.insertAdjacentHTML('beforeend', sheetRowHtml(newRow, sheetRows.length-1));
      saveSheetDraft();
    });

    const clearBtn = document.getElementById('sheetClear');
    if(clearBtn) clearBtn.addEventListener('click', ()=>{
      confirmModal('يومية جديدة', 'هيتم تنظيف الجدول وابتداء صفوف فاضية جديدة. القيود اللي اترحّلت خلاص هتفضل محفوظة في دفتر اليومية زي ما هي، مش هتتأثر. عايز تكمل؟', ()=>{
        sheetRows = makeEmptySheetRows(6);
        saveSheetDraft();
        showToast('✓ الجدول جاهز ليومية جديدة');
        renderAll();
      });
    });
  }

  /* ===================== VIEW: JOURNAL ===================== */

      .filter(tx=>tx.date===journalDate)
      .sort((a,b)=>a.createdAt.localeCompare(b.createdAt));
    const t = totalsForDate(journalDate);
    return `
    <div class="panel">
      <h2><span class="dot"></span> دفتر اليومية</h2>
      <div class="field">
        <label>اختار اليوم</label>
        <input type="date" id="jDate" value="${journalDate}">
      </div>
      <div class="stat-grid">

  /* ===================== VIEW: CUSTOMERS ===================== */
  function renderCustomers(){
    if(selectedCustomerId){
      return renderCustomerLedger(selectedCustomerId);
    }
    const q = customerSearchQuery.trim().toLowerCase();
    let list = state.customers.slice();
    if(q) list = list.filter(c=>c.name.toLowerCase().includes(q));
    list.sort((a,b)=>a.name.localeCompare(b.name,'ar'));

    return `
    <div class="panel">
      <h2><span class="dot"></span> العملاء</h2>
      <div class="field">
        <label>بحث عن عميل</label>
        <input type="text" id="custSearch" placeholder="اكتب اسم العميل..." value="${escapeHtml(customerSearchQuery)}">
      </div>
      <div id="custList">
        ${ list.length===0 ?
          `<div class="empty-state"><div class="icon">👥</div><div class="txt">${state.customers.length===0 ? 'لسه معملتش أي عميل — هيتسجل تلقائي أول ما تكتب اسمه في قيد جديد' : 'مفيش عميل بالاسم ده'}</div></div>`
          : list.map(c=>{
              const t = customerTotals(c.id);
              return `
              <div class="customer-row" data-customer-id="${c.id}">
                <div class="customer-avatar">${escapeHtml(c.name.trim().charAt(0) || '?')}</div>
                <div class="customer-info">
                  <div class="name">${escapeHtml(c.name)}</div>
                  <div class="meta">وارد: ${fmt(t.inTotal)} &nbsp;•&nbsp; منصرف: ${fmt(t.outTotal)}</div>
                </div>
                <div class="customer-net num" style="color:${t.net===0?'var(--text-secondary)': t.net>0?'var(--semantic-success)':'var(--semantic-danger)'}">${t.net>0?'+':''}${fmt(t.net)}</div>
              </div>`;
            }).join('')
        }
      </div>
    </div>
    `;
  }

  function renderCustomerLedger(customerId){
    const c = getCustomerById(customerId);
    if(!c){
      selectedCustomerId = null;
      return renderCustomers();
    }
    const txs = customerTransactions(customerId);
    const t = customerTotals(customerId);
    let running = 0;
    const rows = txs.map(tx=>{
      running += tx.type==='in' ? Number(tx.amount) : -Number(tx.amount);
      return `
      <div class="entry-row" data-id="${tx.id}">
        <div class="entry-icon ${tx.type}">${tx.type==='in'?'↓':'↑'}</div>
        <div class="entry-mid">
          <div class="entry-note">${escapeHtml(tx.note || (tx.type==='in'?'وارد':'منصرف'))}</div>
          <div class="entry-time">${fmtDate(tx.date)} — رصيد بعدها: <span class="num">${fmt(running)}</span></div>
        </div>
        <div class="entry-amount num ${tx.type==='in'?'v in':'v out'}">${tx.type==='in'?'+':'-'}${fmt(tx.amount)}</div>
        <div class="entry-actions">
          <button class="icon-btn" data-action="edit" data-id="${tx.id}">✎</button>
          <button class="icon-btn" data-action="delete" data-id="${tx.id}">✕</button>
        </div>
      </div>`;
    }).join('');

    return `
    <div class="panel">
      <div class="back-link" id="custBack">→ رجوع لكل العملاء</div>
      <h2><span class="dot"></span> حساب: ${escapeHtml(c.name)}</h2>
      <div class="stat-grid">
        <div class="stat-card"><div class="k">إجمالي وارد</div><div class="v num" style="color:var(--semantic-success)">+${fmt(t.inTotal)}</div></div>
        <div class="stat-card"><div class="k">إجمالي منصرف</div><div class="v num" style="color:var(--semantic-danger)">-${fmt(t.outTotal)}</div></div>
        <div class="stat-card"><div class="k">الصافي</div><div class="v num">${fmt(t.net)}</div></div>
      </div>
      <div id="custLedgerList">
        ${ txs.length===0 ? `<div class="empty-state"><div class="icon">📭</div><div class="txt">لسه مفيش حركات على العميل ده</div></div>` : rows }
      </div>
    </div>
    `;
  }

  function bindCustomersEvents(){
    if(selectedCustomerId){
      const backBtn = document.getElementById('custBack');
      if(backBtn) backBtn.addEventListener('click', ()=>{ selectedCustomerId=null; renderAll(); });
      bindEntryListActions('custLedgerList');
      return;
    }
    const searchEl = document.getElementById('custSearch');
    if(searchEl){
      searchEl.addEventListener('input', ()=>{ customerSearchQuery = searchEl.value; renderCustomersInPlace(); });
    }
    document.querySelectorAll('[data-customer-id]').forEach(row=>{
      row.addEventListener('click', ()=>{ selectedCustomerId = row.dataset.customerId; renderAll(); });
    });
  }

  /* re-render only the customers list part, preserving search input focus */
  function renderCustomersInPlace(){
    const listEl = document.getElementById('custList');
    if(!listEl) return;
    const q = customerSearchQuery.trim().toLowerCase();
    let list = state.customers.slice();
    if(q) list = list.filter(c=>c.name.toLowerCase().includes(q));
    list.sort((a,b)=>a.name.localeCompare(b.name,'ar'));
    listEl.innerHTML = list.length===0 ?
      `<div class="empty-state"><div class="icon">👥</div><div class="txt">${state.customers.length===0 ? 'لسه معملتش أي عميل — هيتسجل تلقائي أول ما تكتب اسمه في قيد جديد' : 'مفيش عميل بالاسم ده'}</div></div>`
      : list.map(c=>{
          const t = customerTotals(c.id);
          return `
          <div class="customer-row" data-customer-id="${c.id}">
            <div class="customer-avatar">${escapeHtml(c.name.trim().charAt(0) || '?')}</div>
            <div class="customer-info">
              <div class="name">${escapeHtml(c.name)}</div>
              <div class="meta">وارد: ${fmt(t.inTotal)} &nbsp;•&nbsp; منصرف: ${fmt(t.outTotal)}</div>
            </div>
            <div class="customer-net num" style="color:${t.net===0?'var(--text-secondary)': t.net>0?'var(--semantic-success)':'var(--semantic-danger)'}">${t.net>0?'+':''}${fmt(t.net)}</div>
          </div>`;
        }).join('');
    listEl.querySelectorAll('[data-customer-id]').forEach(row=>{
      row.addEventListener('click', ()=>{ selectedCustomerId = row.dataset.customerId; renderAll(); });
    });
  }

  function renderRecon(){

    const history = state.reconciliations.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);

    return `

      <h2><span class="dot"></span> جرد الخزنة</h2>
      <div class="field">
        <label>تاريخ الجرد</label>
        <input type="date" id="rDate" value="${reconDate}">
      </div>
      <div class="stat-grid" style="grid-template-columns:1fr;">
        <div class="stat-card"><div class="k">الرصيد المحسوب حتى نهاية هذا اليوم</div><div class="v num" style="font-size:1.4rem;">${fmt(calc)} ج.م</div></div>
      </div>
      <div class="field">

        <input type="text" inputmode="decimal" class="num-input" id="rCounted" placeholder="0.00">

  /* ===================== VIEW: REPORTS ===================== */
  let reportPeriod = 'day';
  let reportMonth = todayStr().slice(0,7);
  const ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  function monthRange(monthStr){
    const [y,m] = monthStr.split('-').map(Number);
    const start = monthStr+'-01';
    const lastDay = new Date(y, m, 0).getDate();
    const end = monthStr+'-'+String(lastDay).padStart(2,'0');
    return {start, end};
  }

  function computeMonthlyReport(monthStr){
    const {start, end} = monthRange(monthStr);
    const t = totalsForRange(start, end);
    const openBal = balanceUpTo(addDays(start,-1));
    const closeBal = balanceUpTo(end);
    const txs = state.transactions.filter(tx=>tx.date>=start && tx.date<=end);
    const txCount = txs.length;
    const avgTx = txCount ? (t.inTotal+t.outTotal)/txCount : 0;

    const custMap = {};
    txs.forEach(tx=>{
      if(!tx.customerId) return;
      if(!custMap[tx.customerId]) custMap[tx.customerId] = {inTotal:0, outTotal:0, count:0};
      custMap[tx.customerId].count++;
      if(tx.type==='in') custMap[tx.customerId].inTotal += Number(tx.amount);
      else custMap[tx.customerId].outTotal += Number(tx.amount);
    });
    const topCustomers = Object.entries(custMap)
      .map(([id,v])=>({ id, name:(getCustomerById(id)||{}).name || '—', ...v, total: v.inTotal+v.outTotal }))
      .sort((a,b)=>b.total-a.total)
      .slice(0,5);

    const recons = state.reconciliations.filter(r=>r.date>=start && r.date<=end);
    const reconSummary = {
      count: recons.length,
      okCount: recons.filter(r=>r.diff===0).length,
      surplusCount: recons.filter(r=>r.diff>0).length,
      deficitCount: recons.filter(r=>r.diff<0).length,
      totalDiff: recons.reduce((s,r)=>s+r.diff,0)
    };

    let days = [];
    let cur = start;
    while(cur <= end){ const dt = totalsForDate(cur); days.push({date:cur, ...dt}); cur = addDays(cur,1); }

    return { start, end, openBal, closeBal, inTotal:t.inTotal, outTotal:t.outTotal, net:t.inTotal-t.outTotal, txCount, avgTx, topCustomers, reconSummary, days };
  }

  function monthlyChartSVG(days){
    const maxVal = Math.max(1, ...days.map(d=>Math.max(d.inTotal, d.outTotal)));
    const W=600, H=150, padTop=8, padBottom=22;
    const chartH = H - padTop - padBottom;
    const n = Math.max(days.length,1);
    const groupW = W/n;
    const barW = Math.max(1.5, groupW/2 - 1.5);
    let bars = '';
    /* خطوط شبكية أفقية */
    let grid = '';
    for(let g=1; g<=3; g++){
      const gy = padTop + chartH - (chartH*g/3);
      grid += `<line x1="0" y1="${gy.toFixed(1)}" x2="${W}" y2="${gy.toFixed(1)}" stroke="var(--border-subtle)" stroke-width="1" stroke-dasharray="3,4"></line>`;
    }
    days.forEach((d,i)=>{
      const x = i*groupW;
      const hIn = (d.inTotal/maxVal)*chartH;
      const hOut = (d.outTotal/maxVal)*chartH;
      const dayNum = parseInt(d.date.slice(-2),10);
      bars += `<rect x="${(x+0.5).toFixed(1)}" y="${(padTop+chartH-hIn).toFixed(1)}" width="${barW.toFixed(1)}" height="${hIn.toFixed(1)}" fill="var(--semantic-success)" opacity="0.85" rx="1.5"><title>${fmtDate(d.date)} — وارد ${fmt(d.inTotal)}</title></rect>`;
      bars += `<rect x="${(x+0.5+barW+1).toFixed(1)}" y="${(padTop+chartH-hOut).toFixed(1)}" width="${barW.toFixed(1)}" height="${hOut.toFixed(1)}" fill="var(--semantic-danger)" opacity="0.85" rx="1.5"><title>${fmtDate(d.date)} — منصرف ${fmt(d.outTotal)}</title></rect>`;
      if(n<=15 || i%Math.ceil(n/10)===0){
        bars += `<text x="${(x+groupW/2).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8.5" fill="var(--text-tertiary)">${dayNum}</text>`;
      }
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:150px; display:block; overflow:visible;">${grid}${bars}<line x1="0" y1="${padTop+chartH}" x2="${W}" y2="${padTop+chartH}" stroke="var(--border-default)" stroke-width="1"></line></svg>`;
  }

  /* رسم اتجاه الرصيد يوم بيوم خلال الشهر (منحنى + تدرج) */
  function balanceTrendSVG(monthReport){
    const days = monthReport.days;
    let running = monthReport.openBal;
    const points = days.map(d=>{ running += (d.inTotal - d.outTotal); return running; });
    const allVals = points.concat([monthReport.openBal]);
    const minV = Math.min(...allVals);
    const maxV = Math.max(...allVals);
    const range = (maxV - minV) || 1;
    const W=600, H=130, pad=8;
    const n = points.length;
    const stepX = n>1 ? (W-2*pad)/(n-1) : 0;
    function yFor(v){ return pad + (H-2*pad) - ((v-minV)/range)*(H-2*pad); }
    let pathD = '';
    points.forEach((v,i)=>{
      const x = pad + i*stepX;
      const y = yFor(v);
      pathD += (i===0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
    });
    const lastX = (pad + (n-1)*stepX).toFixed(1);
    const areaD = pathD + `L${lastX},${(H-pad).toFixed(1)} L${pad},${(H-pad).toFixed(1)} Z`;
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:130px; display:block; overflow:visible;">
      <defs><linearGradient id="balGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent-primary)" stop-opacity="0.32"/>
        <stop offset="100%" stop-color="var(--accent-primary)" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${areaD}" fill="url(#balGrad)" stroke="none"></path>
      <path d="${pathD}" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></path>
      <line x1="0" y1="${H-pad}" x2="${W}" y2="${H-pad}" stroke="var(--border-subtle)" stroke-width="1"></line>
    </svg>`;
  }

  /* رسم دائري بسيط لنسبة الوارد مقابل المنصرف */
  function donutChartSVG(inTotal, outTotal){
    const total = inTotal + outTotal;
    const inPct = total>0 ? inTotal/total : 0;
    const r=52, cx=64, cy=64, strokeW=20;
    const circumference = 2*Math.PI*r;
    const inLen = circumference*inPct;
    const outLen = circumference - inLen;
    return `<svg viewBox="0 0 128 128" style="width:128px; height:128px; display:block; margin:0 auto;">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border-subtle)" stroke-width="${strokeW}"></circle>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--semantic-success)" stroke-width="${strokeW}"
        stroke-dasharray="${inLen.toFixed(1)} ${circumference.toFixed(1)}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})"></circle>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--semantic-danger)" stroke-width="${strokeW}"
        stroke-dasharray="${outLen.toFixed(1)} ${circumference.toFixed(1)}" stroke-dashoffset="${(-inLen).toFixed(1)}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})"></circle>
      <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="17" font-weight="800" fill="var(--text-primary)">${total>0?Math.round(inPct*100):0}%</text>
      <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="9" fill="var(--text-tertiary)">نسبة الوارد</text>
    </svg>`;
  }
