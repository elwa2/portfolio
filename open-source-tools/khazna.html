  /* ===================== EXPORT: EXCEL & PDF ===================== */
  function loadScriptOnce(url){
    return new Promise((resolve, reject)=>{
      if(document.querySelector(`script[data-src="${url}"]`) && window.XLSX){ resolve(); return; }
      const existing = document.querySelector(`script[data-src="${url}"]`);
      if(existing){ existing.addEventListener('load', ()=>resolve()); existing.addEventListener('error', ()=>reject(new Error('تعذر تحميل المكتبة'))); return; }
      const s = document.createElement('script');
      s.src = url; s.dataset.src = url;
      s.onload = ()=>resolve();
      s.onerror = ()=>reject(new Error('تعذر تحميل مكتبة التصدير، تأكد من اتصال الإنترنت'));
      document.head.appendChild(s);
    });
  }

  async function exportExcel(){
    try{
      showToast('⏳ جاري تجهيز ملف الإكسل...');
      await loadScriptOnce('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      if(!window.XLSX){ showToast('⚠️ تعذر تحميل مكتبة التصدير'); return; }

      const wb = XLSX.utils.book_new();

      const txRows = state.transactions
        .slice().sort((a,b)=> (a.date+a.createdAt).localeCompare(b.date+b.createdAt))
        .map(tx=>({
          'التاريخ': tx.date,
          'الوقت': fmtTime(tx.createdAt),
          'النوع': tx.type==='in' ? 'وارد' : 'منصرف',
          'المبلغ': Number(tx.amount),
          'البيان': tx.note || '',
          'العميل': tx.customerId ? ((getCustomerById(tx.customerId)||{}).name || '') : ''
        }));
      const ws1 = XLSX.utils.json_to_sheet(txRows);
      XLSX.utils.book_append_sheet(wb, ws1, 'المعاملات');

      const custRows = state.customers.map(c=>{
        const t = customerTotals(c.id);
        return {'اسم العميل': c.name, 'إجمالي وارد': t.inTotal, 'إجمالي منصرف': t.outTotal, 'الصافي': t.net};
      });
      const ws2 = XLSX.utils.json_to_sheet(custRows.length ? custRows : [{'اسم العميل':'لا يوجد عملاء بعد'}]);
      XLSX.utils.book_append_sheet(wb, ws2, 'العملاء');

      const r = computeMonthlyReport(reportMonth);
      const monthRows = r.days.map(d=>({'التاريخ': d.date, 'وارد': d.inTotal, 'منصرف': d.outTotal, 'الصافي': d.inTotal-d.outTotal}));
      monthRows.push({'التاريخ':'', 'وارد':'', 'منصرف':'', 'الصافي':''});
      monthRows.push({'التاريخ':'إجمالي الشهر', 'وارد': r.inTotal, 'منصرف': r.outTotal, 'الصافي': r.net});
      monthRows.push({'التاريخ':'الرصيد الافتتاحي', 'وارد': r.openBal});
      monthRows.push({'التاريخ':'الرصيد الختامي', 'وارد': r.closeBal});
      const ws3 = XLSX.utils.json_to_sheet(monthRows);
      XLSX.utils.book_append_sheet(wb, ws3, 'التقرير الشهري');

      const reconRows = state.reconciliations
        .slice().sort((a,b)=>a.date.localeCompare(b.date))
        .map(rc=>({'التاريخ': rc.date, 'الرصيد المحسوب': rc.calculatedBalance, 'المبلغ المعدود': rc.countedAmount, 'الفرق': rc.diff, 'ملاحظات': rc.note || ''}));
      const ws4 = XLSX.utils.json_to_sheet(reconRows.length ? reconRows : [{'التاريخ':'لا يوجد جرد بعد'}]);
      XLSX.utils.book_append_sheet(wb, ws4, 'الجرد');

      XLSX.writeFile(wb, 'khazna-report-'+reportMonth+'.xlsx');
      showToast('✓ اتحمّل ملف الإكسل');
    }catch(e){
      console.error(e);
      showToast('⚠️ ' + (e.message || 'حصل خطأ في التصدير'));
    }
  }

  function exportPDF(){
    const r = computeMonthlyReport(reportMonth);
    const [y,m] = reportMonth.split('-');
    const monthLabel = ARABIC_MONTHS[parseInt(m,10)-1] + ' ' + y;
    const generatedAt = new Date().toLocaleString('en-US');

    const txRowsHtml = state.transactions
      .filter(tx=>tx.date>=r.start && tx.date<=r.end)
      .sort((a,b)=>(a.date+a.createdAt).localeCompare(b.date+b.createdAt))
      .map(tx=>`
        <tr>
          <td>${tx.date}</td>
          <td>${tx.type==='in'?'وارد':'منصرف'}</td>
          <td>${fmt(tx.amount)}</td>
          <td>${escapeHtml(tx.note||'')}</td>
          <td>${tx.customerId ? escapeHtml((getCustomerById(tx.customerId)||{}).name||'') : ''}</td>
        </tr>`).join('');

    const topCustHtml = r.topCustomers.map(c=>`
      <tr><td>${escapeHtml(c.name)}</td><td>${c.count}</td><td>${fmt(c.inTotal)}</td><td>${fmt(c.outTotal)}</td><td>${fmt(c.total)}</td></tr>
    `).join('');

    const html = `<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8">
<title>تقرير خزنتي - ${monthLabel}</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;}
body{font-family:'Cairo',sans-serif; direction:rtl; color:#1a1a1a; padding:32px; max-width:900px; margin:0 auto;}
.header{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid #e8734a; padding-bottom:16px; margin-bottom:24px;}
.header h1{font-size:1.5rem; margin:0; font-weight:800;}
.header .meta{font-size:0.8rem; color:#666; text-align:left;}
.stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px;}
.stat-box{border:1px solid #ddd; border-radius:10px; padding:14px; text-align:center;}
.stat-box .k{font-size:0.7rem; color:#777; margin-bottom:6px;}
.stat-box .v{font-size:1.15rem; font-weight:800;}
h2{font-size:1.05rem; margin:28px 0 12px; border-inline-start:4px solid #e8734a; padding-inline-start:10px;}
table{width:100%; border-collapse:collapse; font-size:0.82rem; margin-bottom:20px;}
th,td{border:1px solid #ddd; padding:6px 8px; text-align:right;}
th{background:#f4f4f4; font-weight:700;}
.footer{margin-top:32px; font-size:0.7rem; color:#999; text-align:center;}
@media print{ body{padding:10mm;} }
</style></head>
<body>
  <div class="header">
    <h1>خزنتي — التقرير الشهري</h1>
    <div class="meta">${monthLabel}<br>تاريخ الإصدار: ${generatedAt}</div>
  </div>
  <div class="stat-grid">
    <div class="stat-box"><div class="k">إجمالي وارد</div><div class="v">${fmt(r.inTotal)} ج.م</div></div>
    <div class="stat-box"><div class="k">إجمالي منصرف</div><div class="v">${fmt(r.outTotal)} ج.م</div></div>
    <div class="stat-box"><div class="k">صافي الشهر</div><div class="v">${fmt(r.net)} ج.م</div></div>
    <div class="stat-box"><div class="k">الرصيد الافتتاحي</div><div class="v">${fmt(r.openBal)} ج.م</div></div>
    <div class="stat-box"><div class="k">الرصيد الختامي</div><div class="v">${fmt(r.closeBal)} ج.م</div></div>
    <div class="stat-box"><div class="k">عدد العمليات</div><div class="v">${r.txCount}</div></div>
  </div>

  <h2>أعلى العملاء نشاطاً</h2>
  ${ r.topCustomers.length===0 ? '<p style="color:#888; font-size:0.85rem;">مفيش حركات عملاء الشهر ده</p>' : `
  <table>
    <thead><tr><th>العميل</th><th>عدد العمليات</th><th>وارد</th><th>منصرف</th><th>الإجمالي</th></tr></thead>
    <tbody>${topCustHtml}</tbody>
  </table>`}

  <h2>كل معاملات الشهر</h2>
  <table>
    <thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>البيان</th><th>العميل</th></tr></thead>
    <tbody>${txRowsHtml || '<tr><td colspan="5" style="text-align:center; color:#888;">لا توجد معاملات</td></tr>'}</tbody>
  </table>

  <div class="footer">تم إنشاء هذا التقرير تلقائياً بواسطة تطبيق خزنتي</div>
</body></html>`;

    const win = window.open('', '_blank');
    if(!win){ showToast('⚠️ المتصفح منع فتح نافذة جديدة، فعّل النوافذ المنبثقة'); return; }
    win.document.open();
    win.document.write(html);
    win.document.close();
    win.onload = ()=>{ setTimeout(()=> win.print(), 400); };
  }

  /* ===================== VIEW: SETTINGS ===================== */
  function renderSettings(){
    return `
    <div class="panel">
      <h2><span class="dot"></span> الرصيد الافتتاحي</h2>
      <div class="field">
        <label>الفلوس اللي كانت في الخزنة قبل ما تبدأ تستخدم التطبيق</label>
        <input type="text" inputmode="decimal" class="num-input" id="sOpening" value="${fmt(state.openingBalance)}">
      </div>
      <button class="btn-primary" id="sSaveOpening">حفظ الرصيد الافتتاحي</button>
    </div>

    <div class="panel">
      <h2><span class="dot"></span> نقل البيانات بين الأجهزة</h2>
      <div class="setting-row">
        <div class="txt"><div class="t">تصدير البيانات</div><div class="d">احفظ نسخة من كل بياناتك في ملف تقدر تبعته لنفسك</div></div>
        <button class="btn-ghost" id="sExport">تصدير 📤</button>
      </div>
      <div class="setting-row">
        <div class="txt"><div class="t">استيراد البيانات</div><div class="d">ارفع ملف نسخة احتياطية من جهاز تاني</div></div>
        <button class="btn-ghost" id="sImportBtn">استيراد 📥</button>
        <input type="file" id="sImportFile" accept="application/json">
      </div>
    </div>

    <div class="panel">
      <h2><span class="dot"></span> منطقة الخطر</h2>
      <div class="setting-row">
        <div class="txt"><div class="t">مسح كل البيانات</div><div class="d">حذف كل القيود وعمليات الجرد نهائياً من هذا الجهاز</div></div>
        <button class="btn-danger-ghost" id="sClearAll">مسح الكل 🗑️</button>
      </div>
    </div>

    <div style="text-align:center; font-size:0.7rem; color:var(--text-tertiary); margin-top:var(--space-2); font-family:'JetBrains Mono',monospace;">
      خزنتي — إصدار ${APP_VERSION}
    </div>
    `;
  }
  function bindSettingsEvents(){
    attachMoneyFormatting(document.getElementById('sOpening'));
    document.getElementById('sSaveOpening').addEventListener('click', ()=>{
      const v = parseMoneyString(document.getElementById('sOpening').value);
      state.openingBalance = v;
      saveState(); showToast('✓ اتحفظ الرصيد الافتتاحي'); renderAll();
    });

    document.getElementById('sExport').addEventListener('click', ()=>{
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'khazna-backup-' + todayStr() + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('✓ اتحمّل ملف النسخة الاحتياطية');
    });

    const importBtn = document.getElementById('sImportBtn');
    const importFile = document.getElementById('sImportFile');
    importBtn.addEventListener('click', ()=> importFile.click());
    importFile.addEventListener('change', (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (ev)=>{
        try{
          const imported = JSON.parse(ev.target.result);
          if(!imported || !Array.isArray(imported.transactions)){
            showToast('⚠️ الملف مش بصيغة صحيحة'); return;
          }
          confirmImport(imported);
        }catch(err){
          showToast('⚠️ تعذرت قراءة الملف');
        }
      };
      reader.readAsText(file);
      importFile.value = '';
    });

    document.getElementById('sClearAll').addEventListener('click', ()=>{
      confirmModal('مسح كل البيانات', 'هيتم حذف كل القيود وعمليات الجرد نهائياً من هذا الجهاز. الأفضل تعمل تصدير للبيانات الأول. متأكد عايز تكمل؟', ()=>{
        state = { openingBalance:0, transactions:[], reconciliations:[], customers:[] };
        saveState(); showToast('🗑️ اتمسحت كل البيانات'); renderAll();
      });
    });
  }

  function confirmImport(imported){
    const root = document.getElementById('modal-root');
    root.innerHTML = `
      <div class="modal-overlay" id="impOverlay">
        <div class="modal-box">
          <h3>استيراد البيانات</h3>
          <p style="color:var(--text-secondary); font-size:0.88rem; line-height:1.6;">
            الملف ده فيه ${imported.transactions.length} قيد. اختار طريقة الدمج:
          </p>
          <div class="modal-actions" style="flex-direction:column;">
            <button class="btn-primary" id="impMerge">دمج مع البيانات الحالية</button>
            <button class="btn-ghost" id="impReplace" style="color:var(--semantic-danger); border-color:rgba(248,113,113,0.3);">استبدال كل البيانات الحالية</button>
            <button class="btn-ghost" id="impCancel">إلغاء</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('impCancel').addEventListener('click', ()=> root.innerHTML='');
    document.getElementById('impOverlay').addEventListener('click', (e)=>{ if(e.target.id==='impOverlay') root.innerHTML=''; });
    document.getElementById('impReplace').addEventListener('click', ()=>{
      state = {
        openingBalance: imported.openingBalance||0,
        transactions: imported.transactions||[],
        reconciliations: imported.reconciliations||[],
        customers: imported.customers||[]
      };
      saveState(); root.innerHTML=''; showToast('✓ اتبدلت البيانات'); renderAll();
    });
    document.getElementById('impMerge').addEventListener('click', ()=>{
      const existingIds = new Set(state.transactions.map(t=>t.id));
      (imported.transactions||[]).forEach(t=>{ if(!existingIds.has(t.id)) state.transactions.push(t); });
      const existingRIds = new Set(state.reconciliations.map(r=>r.id));
      (imported.reconciliations||[]).forEach(r=>{ if(!existingRIds.has(r.id)) state.reconciliations.push(r); });
      const existingCIds = new Set(state.customers.map(c=>c.id));
      (imported.customers||[]).forEach(c=>{ if(!existingCIds.has(c.id)) state.customers.push(c); });
      saveState(); root.innerHTML=''; showToast('✓ اتدمجت البيانات'); renderAll();
    });
  }

  /* ===================== MAIN RENDER ===================== */
  function renderAll(){
    renderTopbar();
    renderTabbar();
    renderCustomerDatalist();
    const content = document.getElementById('content');
    if(activeTab==='quick'){ content.innerHTML = renderQuick(); bindQuickEvents(); }
    else if(activeTab==='sheet'){ content.innerHTML = renderSheet(); bindSheetEvents(); }
    else if(activeTab==='journal'){ content.innerHTML = renderJournal(); bindJournalEvents(); }
    else if(activeTab==='customers'){ content.innerHTML = renderCustomers(); bindCustomersEvents(); }
    else if(activeTab==='recon'){ content.innerHTML = renderRecon(); bindReconEvents(); }
    else if(activeTab==='reports'){ content.innerHTML = renderReports(); bindReportsEvents(); }
    else if(activeTab==='settings'){ content.innerHTML = renderSettings(); bindSettingsEvents(); }
  }

  renderAll();
})();
</script>
</body>
</html>
