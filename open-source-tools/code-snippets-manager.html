<!doctype html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>مدير الأكواد | Code Manager</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- Prism.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js" defer></script>

  <style>
    /* ===== RESET ===== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Cairo',sans-serif;background:#0D0F1A;color:#E8EAED;min-height:100vh;overflow-x:hidden;direction:rtl}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;font-family:inherit}
    input{font-family:inherit}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

    /* ===== VARIABLES ===== */
    :root{
      --bg:#0D0F1A;
      --bg-card:#161825;
      --bg-elevated:#1C1F33;
      --accent:#FF4B2B;
      --accent-hover:#FF6347;
      --accent-purple:#7B5EA7;
      --accent-purple-hover:#8F6FBF;
      --text:#E8EAED;
      --text-dim:#6B7280;
      --text-muted:rgba(232,234,237,0.5);
      --border:rgba(255,255,255,0.07);
      --border-hover:rgba(255,255,255,0.12);
      --code-bg:#1A1C2E;
      --shadow:0 4px 24px rgba(0,0,0,0.3);
      --radius:10px;
      --radius-sm:6px;
      --radius-lg:16px;
      --transition:0.25s cubic-bezier(.4,0,.2,1);
    }

    /* ===== CANVAS BG ===== */
    #constellationCanvas{
      position:fixed;top:0;left:0;width:100%;height:100%;
      z-index:0;pointer-events:none;opacity:0.5;
    }

    /* ===== GRAIN ===== */
    .grain-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      z-index:1;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
      background-repeat:repeat;background-size:256px;
    }

    /* ===== APP WRAPPER ===== */
    .app-wrapper{
      position:relative;z-index:2;display:flex;flex-direction:column;min-height:100vh;
    }

    /* ===== HEADER ===== */
    .header{
      background:rgba(13,15,26,0.85);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
    }
    .header-inner{
      max-width:1200px;margin:0 auto;padding:0 24px;
      display:flex;align-items:center;justify-content:space-between;height:64px;
    }
    .header-right{display:flex;align-items:center;gap:28px}
    .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:1.15rem}
    .logo-icon{font-size:1.5rem}
    .logo span{background:linear-gradient(135deg,var(--accent),#FF8A65);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav{display:flex;gap:4px}
    .nav a{
      padding:6px 14px;border-radius:20px;font-size:0.85rem;font-weight:500;
      color:var(--text-dim);transition:var(--transition);position:relative;
    }
    .nav a:hover{color:var(--text);background:rgba(255,255,255,0.04)}
    .nav a.active{background:var(--accent);color:#fff;font-weight:700}
    .header-left{display:flex;align-items:center;gap:16px}
    .user-info{display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-dim)}
    .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:#fff}
    .icon-btn{
      width:36px;height:36px;border-radius:8px;border:none;background:transparent;
      color:var(--text-dim);font-size:1.15rem;display:flex;align-items:center;justify-content:center;
      transition:var(--transition);
    }
    .icon-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
    .mobile-toggle{display:none}

    /* ===== MAIN ===== */
    .main{
      flex:1;max-width:1200px;margin:0 auto;padding:32px 24px 60px;width:100%;
    }

    /* ===== PAGE HEADER ===== */
    .page-header{
      display:flex;align-items:flex-start;gap:16px;margin-bottom:36px;
    }
    .page-header .icon{
      font-size:2.8rem;line-height:1;flex-shrink:0;
      filter:drop-shadow(0 0 20px rgba(255,75,43,0.3));
      animation:pulseIcon 3s ease-in-out infinite;
    }
    @keyframes pulseIcon{
      0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(255,75,43,0.3))}
      50%{transform:scale(1.05);filter:drop-shadow(0 0 30px rgba(255,75,43,0.5))}
    }
    .page-header-text{}
    .page-header h1{font-size:2rem;font-weight:800;margin:0;line-height:1.2}
    .page-header h1 span{background:linear-gradient(135deg,var(--accent),#FF8A65);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .page-header p{color:var(--text-dim);font-size:0.9rem;margin-top:4px}

    /* ===== TOOLBAR ===== */
    .toolbar{
      display:flex;align-items:center;gap:6px;padding:10px 16px;
      background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);
      margin-bottom:28px;flex-wrap:wrap;
    }
    .tb-btn{
      width:34px;height:34px;border-radius:8px;border:none;background:transparent;
      color:var(--text-dim);font-size:1rem;display:flex;align-items:center;justify-content:center;
      transition:var(--transition);
    }
    .tb-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
    .tb-btn.active{background:rgba(255,75,43,0.12);color:var(--accent)}
    .tb-btn.fav-on{color:#FFD700}
    .tb-divider{width:1px;height:24px;background:var(--border);margin:0 4px}
    #searchWrap{display:none;flex:1;min-width:120px}
    #searchWrap.open{display:block}
    #snippetSearch{
      width:100%;padding:7px 12px;border-radius:var(--radius-sm);
      border:1px solid var(--border);background:var(--bg);
      color:var(--text);font-size:0.85rem;outline:none;transition:var(--transition);
    }
    #snippetSearch:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,75,43,0.1)}
    #snippetSearch::placeholder{color:var(--text-muted)}
    .tb-count{
      font-size:0.8rem;color:var(--text-dim);direction:ltr;
      background:rgba(255,255,255,0.04);padding:3px 10px;border-radius:12px;
    }

    /* ===== FILTER BAR ===== */
    #filterWrap{display:none;flex-wrap:wrap;gap:4px;width:100%;padding:6px 0 2px}
    #filterWrap.open{display:flex}
    .fl-btn{
      font-size:0.75rem;padding:3px 10px;border:1px solid var(--border);background:transparent;
      border-radius:12px;cursor:pointer;color:var(--text-dim);transition:var(--transition);
    }
    .fl-btn:hover{border-color:var(--accent-purple);color:var(--text)}
    .fl-btn.active{background:var(--accent-purple);border-color:var(--accent-purple);color:#fff;font-weight:600}

    /* ===== SNIPPETS LIST ===== */
    #snippetsList{display:flex;flex-direction:column;gap:8px}

    /* ===== SNIPPET CARD (TOGGLE) ===== */
    .snippet-card{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--radius-lg);overflow:hidden;
      transition:border-color var(--transition),box-shadow var(--transition);
      position:relative;
    }
    .snippet-card:hover{border-color:var(--accent-purple);box-shadow:0 4px 20px rgba(123,94,167,0.08)}
    .snippet-card.open{border-color:rgba(123,94,167,0.3)}

    .snippet-header{
      display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;
      user-select:none;transition:background var(--transition);position:relative;
    }
    .snippet-header:hover{background:rgba(255,255,255,0.02)}

    .toggle-arrow{
      font-size:0.7rem;color:var(--text-dim);transition:transform 0.3s ease;
      flex-shrink:0;width:20px;text-align:center;
    }
    .snippet-card.open .toggle-arrow{transform:rotate(90deg)}

    .snippet-title{font-weight:600;font-size:0.92rem;flex:1;color:var(--text)}

    .snippet-tags{display:flex;gap:4px;flex-wrap:wrap}
    .snp-tag{
      font-size:0.65rem;padding:1px 8px;border-radius:8px;
      background:rgba(123,94,167,0.12);color:var(--accent-purple);
      cursor:pointer;transition:var(--transition);white-space:nowrap;
    }
    .snp-tag:hover{background:rgba(123,94,167,0.25)}

    .snippet-actions{
      display:flex;align-items:center;gap:2px;opacity:0;transition:opacity var(--transition);
    }
    .snippet-card:hover .snippet-actions{opacity:1}
    .sa-btn{
      width:28px;height:28px;border:none;border-radius:6px;background:transparent;
      color:var(--text-dim);font-size:0.8rem;display:flex;align-items:center;justify-content:center;
      transition:var(--transition);
    }
    .sa-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
    .sa-btn.fav{font-size:0.9rem}
    .sa-btn.fav.on{color:#FFD700}
    .sa-btn.lock{font-size:0.75rem}
    .sa-btn.lock.unlocked{color:#4CAF50}

    /* ===== CODE BODY ===== */
    .snippet-body{
      max-height:0;overflow:hidden;transition:max-height 0.35s ease;
    }
    .snippet-card.open .snippet-body{max-height:2000px}

    .code-wrapper{
      margin:0 16px 14px;border-radius:var(--radius);overflow:hidden;
      border:1px solid var(--border);background:var(--code-bg);
    }
    .code-wrapper.editable{border-color:#4CAF50;box-shadow:0 0 0 2px rgba(76,175,80,0.15)}

    .code-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 12px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);
      direction:ltr;
    }
    .code-lang-badge{
      font-size:0.65rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;
      letter-spacing:0.05em;text-transform:uppercase;
    }
    .code-header-actions{display:flex;gap:4px}
    .ch-btn{
      padding:3px 10px;border:none;border-radius:4px;background:rgba(255,255,255,0.04);
      color:var(--text-dim);font-size:0.72rem;font-family:inherit;transition:var(--transition);
      display:flex;align-items:center;gap:4px;
    }
    .ch-btn:hover{background:rgba(255,75,43,0.15);color:var(--accent)}
    .ch-btn.copied{background:rgba(76,175,80,0.15);color:#4CAF50}

    .code-body{
      padding:14px 16px;overflow-x:auto;direction:ltr;text-align:left;
      font-family:'JetBrains Mono',monospace;font-size:0.82rem;line-height:1.65;
      white-space:pre;tab-size:2;min-height:40px;
    }
    .code-body:focus{outline:none}
    .code-body .token{background:transparent!important}
    .code-body pre{margin:0;background:transparent!important}
    .code-body code{background:none!important;padding:0!important}
    .code-body .hl-match{background:rgba(255,75,43,0.2);border-radius:2px;padding:0 2px}

    .status-badge{
      display:inline-flex;align-items:center;gap:3px;font-size:0.6rem;padding:1px 7px;
      border-radius:6px;margin-right:6px;
    }
    .status-badge.locked{background:rgba(255,255,255,0.06);color:var(--text-dim)}
    .status-badge.editing{background:rgba(76,175,80,0.12);color:#4CAF50}

    /* ===== NO RESULTS ===== */
    .no-results{text-align:center;padding:60px 20px;color:var(--text-dim)}
    .no-results i{font-size:2.5rem;display:block;margin-bottom:10px}

    /* ===== TOAST ===== */
    #toast{
      position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(12px);
      background:var(--bg-elevated);color:var(--text);padding:10px 24px;
      border-radius:var(--radius);font-size:0.85rem;font-weight:600;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:9999;
      opacity:0;pointer-events:none;transition:all 0.25s ease;
      border:1px solid var(--border);
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ===== BLOCK MENU ===== */
    #blockMenu{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.95);
      background:var(--bg-elevated);border:1px solid var(--border);
      border-radius:var(--radius-lg);padding:16px;width:320px;
      z-index:9998;opacity:0;pointer-events:none;transition:all 0.2s ease;
      box-shadow:0 16px 48px rgba(0,0,0,0.5);
    }
    #blockMenu.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
    #blockMenu h3{font-size:0.85rem;color:var(--text-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .bm-item{
      display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);
      cursor:pointer;transition:var(--transition);
    }
    .bm-item:hover{background:rgba(255,255,255,0.04)}
    .bm-item .bm-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:rgba(255,255,255,0.04)}
    .bm-item .bm-info{flex:1}
    .bm-item .bm-name{font-size:0.85rem;font-weight:500}
    .bm-item .bm-shortcut{font-size:0.65rem;color:var(--text-dim);direction:ltr}
    .bm-item .bm-desc{font-size:0.7rem;color:var(--text-muted)}

    /* ===== OVERLAY ===== */
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9997;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.2s}
    .overlay.show{opacity:1;pointer-events:all}

    /* ===== RESPONSIVE ===== */
    @media(max-width:768px){
      .nav{display:none}
      .mobile-toggle{display:flex}
      .user-info .user-name{display:none}
      .header-inner{padding:0 16px}
      .main{padding:24px 16px}
      .page-header h1{font-size:1.5rem}
      .page-header .icon{font-size:2rem}
      .snippet-actions{opacity:1}
      .snippet-header{padding:10px 12px}
      .snippet-title{font-size:0.85rem}
    }
    @media(max-width:480px){
      .toolbar{gap:4px;padding:8px 10px}
      .header-left .icon-btn{width:30px;height:30px;font-size:1rem}
    }
  </style>
</head>
<body>
  <canvas id="constellationCanvas"></canvas>
  <div class="grain-overlay"></div>

  <div class="app-wrapper">
    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="header-right">
          <div class="logo"><span class="logo-icon">🌶️</span> <span>مدير الأكواد</span></div>
          <nav class="nav">
            <a href="../index.html">الرئيسية</a>
            <a href="../works.html">أعمالنا</a>
            <a href="index.html" class="active">أدواتنا</a>
            <a href="../index.html#contact">تواصل معنا</a>
          </nav>
        </div>
        <div class="header-left">
          <div class="user-info">
            <span class="user-avatar">ع</span>
            <span class="user-name">Ali Ahmed</span>
          </div>
          <button class="icon-btn" title="الإعدادات">⚙️</button>
          <button class="icon-btn mobile-toggle">☰</button>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">
      <div class="page-header">
        <span class="icon">🌶️</span>
        <div class="page-header-text">
          <h1><span>مدير الأكواد</span></h1>
          <p>57 مقطع كود — اضغط على العنوان لعرض الكود وانسخه بنقرة</p>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <button class="tb-btn" id="searchToggle" title="بحث">🔍</button>
        <div id="searchWrap"><input type="text" id="snippetSearch" placeholder="ابحث عن كود... (Ctrl+K)" autocomplete="off"/></div>

        <button class="tb-btn" id="filterToggle" title="تصفية">🏷️</button>
        <div id="filterWrap"></div>

        <div class="tb-divider"></div>
        <button class="tb-btn" id="favFilter" title="المفضلة">⭐</button>
        <button class="tb-btn" id="expandAll" title="فتح الكل">⊞</button>
        <button class="tb-btn" id="collapseAll" title="إغلاق الكل">⊟</button>
        <button class="tb-btn" id="blockMenuBtn" title="إضافة بلوك">＋</button>
        <div class="tb-divider"></div>
        <span class="tb-count" id="resultCount">57</span>
      </div>

      <!-- SNIPPETS -->
      <div id="snippetsList"></div>
    </main>
  </div>

  <!-- BLOCK MENU -->
  <div class="overlay" id="overlay"></div>
  <div id="blockMenu">
    <h3>إضافة بلوك</h3>
    <div class="bm-item" data-type="text"><div class="bm-icon">📝</div><div class="bm-info"><div class="bm-name">نص</div><div class="bm-shortcut">⌨️</div></div></div>
    <div class="bm-item" data-type="h1"><div class="bm-icon">🔠</div><div class="bm-info"><div class="bm-name">عنوان 1</div><div class="bm-shortcut">#</div></div></div>
    <div class="bm-item" data-type="toggle"><div class="bm-icon">▶</div><div class="bm-info"><div class="bm-name">قائمة طي (Toggle)</div><div class="bm-desc">يمكنك إخفاء وعرض المحتوى بداخلها</div></div></div>
    <div class="bm-item" data-type="bullet"><div class="bm-icon">•</div><div class="bm-info"><div class="bm-name">قائمة نقطية</div><div class="bm-shortcut">-</div></div></div>
    <div class="bm-item" data-type="todo"><div class="bm-icon">☑</div><div class="bm-info"><div class="bm-name">قائمة مهام</div><div class="bm-shortcut">[ ]</div></div></div>
    <div class="bm-item" data-type="code"><div class="bm-icon">💻</div><div class="bm-info"><div class="bm-name">مقطع كود</div><div class="bm-shortcut">```</div></div></div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script>
    const SnippetsData = [
      {t:"تصفير الهوامش - General Reset",c:`*{margin:0;padding:0;box-sizing:border-box}`,g:["reset","base"]},
      {t:"لغة المحتوى - Language Selector",c:`:lang(en){}\n:lang(ar){}`,g:["i18n","lang"]},
      {t:"تغيير اللوجو - Custom Logo",c:`:root{--logo:url("")}\n.navbar-brand img,.store-footer .footer-container .logo-footer .foo{max-height:3rem!important;content:var(--logo)!important}`,g:["logo","brand","salla"]},
      {t:"نقاط الاستجابة - Media Queries",c:`@media(min-width:767px){}\n@media(max-width:767px){}\n@media(max-width:500px){}\n@media(max-width:420px){}\n@media(max-width:370px){}`,g:["responsive","media"]},
      {t:"المحددات المتقدمة - Advanced Selectors",c:":nth-child(1)\n:nth-of-type(3)\n:nth-last-child(2)\n:has(div[class*=\"discount\"])\n.feature-item:not(:last-child)\nimg[src*=\"\"]{content:url()}\nbody[data-template=\"home\"]\n.card:where(width>300px)h3{}",g:["selectors","css"]},
      {t:"تبديل محتوى الصورة - Image Content Replace",c:`img[src*=""]{content:'';display:block;object-fit:contain;transform:scale(.7);filter:brightness(18.5)}`,g:["image","filter","content"]},
      {t:"إضافة بانر قبل المنتج - Product Banner",c:`.product-single .main-content .product-form:before{display:block;content:'';width:100%;height:56px;background:url(https://cdn.salla.sa/form-builder/jbVL9G9qdeP3ZNFa8OXQR1OnN2rQpZaMym5aYgQP.png) no-repeat center/contain}`,g:["product","salla","banner"]},

      {t:"تجاوز زر المنتج - Product Card Cart Override",c:`.product-card__normal-cart__btn .s-button-text{font-size:0}\n.product-card__normal-cart__btn .s-button-text:before{font-size:.875rem;content:'  '}`,g:["button","product","salla"]},
      {t:"سكرول بسيط - Simple Scrollbar",c:`::-webkit-scrollbar{width:10px;height:10px}\n::-webkit-scrollbar-track-piece{background-color:#0003}\n::-webkit-scrollbar-thumb:vertical{height:200px;background-color:#585858}`,g:["scrollbar","ui"]}
    ];

    /* ===== STATE ===== */
    let activeTag = 'all';
    let showFavOnly = false;
    let searchQ = '';
    let favorites = [];
    let lockStates = {};
    try { favorites = JSON.parse(localStorage.getItem('csm_favs') || '[]'); } catch(e) {}
    try { lockStates = JSON.parse(localStorage.getItem('csm_locks') || '{}'); } catch(e) {}

    /* ===== BUILD FILTERS ===== */
    function buildFilters() {
      const tags = new Set();
      SnippetsData.forEach(s => s.g.forEach(t => tags.add(t)));
      const wrap = document.getElementById('filterWrap');
      wrap.innerHTML = '<button class="fl-btn active" data-tag="all">الكل</button>';
      [...tags].sort().forEach(tag => {
        const b = document.createElement('button');
        b.className = 'fl-btn'; b.dataset.tag = tag; b.textContent = tag;
        wrap.appendChild(b);
      });
      wrap.addEventListener('click', e => {
        const b = e.target.closest('.fl-btn');
        if (!b) return;
        activeTag = b.dataset.tag;
        wrap.querySelectorAll('.fl-btn').forEach(x => x.classList.toggle('active', x.dataset.tag === activeTag));
        render();
      });
    }

    /* ===== RENDER ===== */
    function render() {
      const q = searchQ.toLowerCase().trim();
      const list = document.getElementById('snippetsList');

      const filtered = SnippetsData.map((s, i) => {
        if (showFavOnly && !favorites.includes(s.t)) return null;
        if (activeTag !== 'all' && !s.g.includes(activeTag)) return null;
        if (q && !s.t.toLowerCase().includes(q) && !s.c.toLowerCase().includes(q) && !s.g.some(t => t.toLowerCase().includes(q))) return null;
        return { s, i };
      }).filter(Boolean);

      document.getElementById('resultCount').textContent = String(filtered.length);

      if (!filtered.length) {
        list.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><p>لا توجد نتائج مطابقة</p></div>';
        return;
      }

      let html = '';
      filtered.forEach(({ s, i }) => {
        const isFav = favorites.includes(s.t);
        const isLocked = lockStates[i] !== false;
        const isJS = s.c.includes('function') || s.c.includes('const ') || s.c.includes('fetch(') || s.c.includes('allowedDomains');
        html += `<div class="snippet-card" data-idx="${i}">
          <div class="snippet-header">
            <span class="toggle-arrow">▶</span>
            <span class="snippet-title">${esc(s.t)}</span>
            <span class="snippet-tags">${s.g.map(t => `<span class="snp-tag" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}</span>
            <span class="snippet-actions">
              <button class="sa-btn copy-quick" data-idx="${i}" title="نسخ">📋</button>
              <button class="sa-btn fav${isFav?' on':''}" data-title="${esc(s.t)}" title="${isFav?'إزالة من المفضلة':'إضافة للمفضلة'}">${isFav?'★':'☆'}</button>
              <button class="sa-btn lock${isLocked?'':' unlocked'}" data-idx="${i}" title="${isLocked?'مقفل - اضغط للفتح':'محرر - اضغط للقفل'}">${isLocked?'🔒':'🔓'}</button>
              <button class="sa-btn" title="حذف">🗑️</button>
            </span>
          </div>
          <div class="snippet-body">
            <div class="code-wrapper${!isLocked?' editable':''}">
              <div class="code-header">
                <span class="code-lang-badge">${isJS?'JavaScript':'CSS'} <span class="status-badge ${isLocked?'locked':'editing'}">${isLocked?'🔒 مقفل':'✏️ محرر'}</span></span>
                <div class="code-header-actions">
                  <button class="ch-btn copy-btn" data-idx="${i}">📋 نسخ الكود</button>
                </div>
              </div>
              <div class="code-body" contenteditable="${!isLocked}" data-idx="${i}">${esc(s.c)}</div>
            </div>
          </div>
        </div>`;
      });
      list.innerHTML = html;
      attachEvents();
      applyHighlight();
      restoreToggles();
    }

    /* ===== SYNTAX HIGHLIGHT ===== */
    function applyHighlight() {
      document.querySelectorAll('.code-body').forEach(el => {
        const code = el.textContent.replace(/\u00a0/g, ' ').trim();
        if (!code) return;
        const isJS = code.includes('function') || code.includes('const ') || code.includes('fetch(') || code.includes('allowedDomains');
        const lang = isJS ? 'javascript' : 'css';
        el.innerHTML = Prism ? Prism.highlight(code, Prism.languages[lang], lang) : esc(code);
        // Apply search highlight
        const q = searchQ.trim();
        if (q) {
          el.innerHTML = el.innerHTML.replace(
            new RegExp(escRegExp(q), 'gi'),
            m => `<span class="hl-match">${esc(m)}</span>`
          );
        }
      });
    }

    /* ===== EVENTS ===== */
    function attachEvents() {
      const list = document.getElementById('snippetsList');

      // Toggle open/close + copy code
      list.querySelectorAll('.snippet-header').forEach(hdr => {
        hdr.addEventListener('click', e => {
          if (e.target.closest('.snippet-actions') || e.target.closest('.snp-tag')) return;
          const card = hdr.closest('.snippet-card');
          const idx = +card.dataset.idx;
          const code = SnippetsData[idx].c;
          copyText(code, '✓ تم نسخ الكود');
          card.classList.toggle('open');
          saveToggles();
        });
      });

      // Copy buttons
      list.querySelectorAll('.copy-btn, .copy-quick').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = +btn.dataset.idx;
          const code = SnippetsData[idx].c;
          copyText(code, '✓ تم نسخ الكود');
          if (btn.classList.contains('copy-btn')) {
            btn.textContent = '✓ تم';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = '📋 نسخ الكود'; btn.classList.remove('copied'); }, 1800);
          }
        });
      });

      // Fav buttons
      list.querySelectorAll('.fav').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const title = btn.dataset.title;
          if (favorites.includes(title)) {
            favorites = favorites.filter(f => f !== title);
            btn.textContent = '☆'; btn.classList.remove('on');
          } else {
            favorites.push(title);
            btn.textContent = '★'; btn.classList.add('on');
          }
          try { localStorage.setItem('csm_favs', JSON.stringify(favorites)); } catch(e) {}
          if (showFavOnly) render();
        });
      });

      // Lock buttons
      list.querySelectorAll('.lock').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const idx = +btn.dataset.idx;
          const card = btn.closest('.snippet-card');
          const body = card.querySelector('.code-body');
          const wrapper = card.querySelector('.code-wrapper');
          const badge = card.querySelector('.status-badge');
          const isLocked = lockStates[idx] !== false;
          lockStates[idx] = isLocked ? false : true;
          try { localStorage.setItem('csm_locks', JSON.stringify(lockStates)); } catch(e) {}
          btn.title = isLocked ? 'محرر - اضغط للقفل' : 'مقفل - اضغط للفتح';
          btn.classList.toggle('unlocked');
          body.contentEditable = isLocked ? 'true' : 'false';
          wrapper.classList.toggle('editable');
          badge.className = `status-badge ${isLocked?'editing':'locked'}`;
          badge.textContent = isLocked ? '✏️ محرر' : '🔒 مقفل';
        });
      });

      // Tag clicks
      list.querySelectorAll('.snp-tag').forEach(tag => {
        tag.addEventListener('click', e => {
          e.stopPropagation();
          activeTag = tag.dataset.tag;
          document.querySelectorAll('#filterWrap .fl-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === activeTag));
          const fw = document.getElementById('filterWrap');
          if (!fw.classList.contains('open')) fw.classList.add('open');
          if (!document.getElementById('filterToggle').classList.contains('active')) document.getElementById('filterToggle').classList.add('active');
          render();
        });
      });

      // ContentEditable: save on blur
      list.querySelectorAll('.code-body').forEach(el => {
        el.addEventListener('blur', () => {
          const idx = +el.dataset.idx;
          if (lockStates[idx] === false) {
            SnippetsData[idx].c = el.textContent.trim();
            applyHighlight();
          }
        });
      });
    }

    /* ===== TOGGLE PERSISTENCE ===== */
    function saveToggles() {
      const states = {};
      document.querySelectorAll('.snippet-card').forEach(c => {
        states[c.dataset.idx] = c.classList.contains('open');
      });
      try { localStorage.setItem('csm_toggles', JSON.stringify(states)); } catch(e) {}
    }

    function restoreToggles() {
      try {
        const states = JSON.parse(localStorage.getItem('csm_toggles') || '{}');
        document.querySelectorAll('.snippet-card').forEach(c => {
          if (states[c.dataset.idx]) c.classList.add('open');
        });
      } catch(e) {}
    }

    document.addEventListener('click', e => {
      const card = e.target.closest('.snippet-card');
      if (card && e.target.closest('.snippet-header') && !e.target.closest('.snippet-actions') && !e.target.closest('.snp-tag')) {
        saveToggles();
      }
    });

    /* ===== COPY ===== */
    async function copyText(text, msg) {
      try { await navigator.clipboard.writeText(text); }
      catch {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove();
      }
      showToast(msg);
    }

    /* ===== TOAST ===== */
    let _tt;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 1800);
    }

    /* ===== UTILS ===== */
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    /* ===== CONTROLS ===== */
    document.getElementById('searchToggle').addEventListener('click', function() {
      document.getElementById('searchWrap').classList.toggle('open');
      this.classList.toggle('active');
      if (document.getElementById('searchWrap').classList.contains('open')) document.getElementById('snippetSearch').focus();
    });
    document.getElementById('snippetSearch').addEventListener('input', e => { searchQ = e.target.value; render(); });
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        document.getElementById('searchToggle').click();
      }
    });

    document.getElementById('filterToggle').addEventListener('click', function() {
      document.getElementById('filterWrap').classList.toggle('open');
      this.classList.toggle('active');
    });

    document.getElementById('favFilter').addEventListener('click', function() {
      showFavOnly = !showFavOnly;
      this.classList.toggle('fav-on', showFavOnly);
      render();
    });

    document.getElementById('expandAll').addEventListener('click', () => {
      document.querySelectorAll('.snippet-card').forEach(c => c.classList.add('open'));
      saveToggles();
    });
    document.getElementById('collapseAll').addEventListener('click', () => {
      document.querySelectorAll('.snippet-card').forEach(c => c.classList.remove('open'));
      saveToggles();
    });

    // Block menu
    const blockMenu = document.getElementById('blockMenu');
    const overlay = document.getElementById('overlay');
    document.getElementById('blockMenuBtn').addEventListener('click', () => {
      blockMenu.classList.toggle('open');
      overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', () => {
      blockMenu.classList.remove('open');
      overlay.classList.remove('show');
    });

    /* ===== CONSTELLATION CANVAS ===== */
    const canvas = document.getElementById('constellationCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [], mouse = {x:-999,y:-999};

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const COUNT = 80;
    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 1.5 + 1
      });
    }

    canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    canvas.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

    function draw() {
      ctx.clearRect(0, 0, W, H);

      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      });

      // Draw connections
      ctx.strokeStyle = 'rgba(123,94,167,0.12)';
      ctx.lineWidth = 0.6;
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 140) {
            ctx.globalAlpha = (1 - dist / 140) * 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
        // Mouse connection
        if (mouse.x > 0) {
          const dx = particles[i].x - mouse.x;
          const dy = particles[i].y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 180) {
            ctx.strokeStyle = `rgba(255,75,43,${(1 - dist / 180) * 0.3})`;
            ctx.globalAlpha = (1 - dist / 180) * 0.4;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.stroke();
          }
        }
      }

      // Draw particles
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(123,94,167,0.4)';
        ctx.fill();
      });

      // Mouse glow
      if (mouse.x > 0) {
        const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 100);
        grd.addColorStop(0, 'rgba(255,75,43,0.06)');
        grd.addColorStop(1, 'rgba(255,75,43,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    draw();

    /* ===== INIT ===== */
    buildFilters();
    render();
  </script>
</body>
</html>
