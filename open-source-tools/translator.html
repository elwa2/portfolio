<!doctype html>
<html lang="ar" dir="rtl" data-theme="light">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أداة الترجمة الذكية | Ali Ahmed</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/fonts.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/design-enhancements.css" />
    <link rel="stylesheet" href="../assets/css/svg-icons.css" />
    <link rel="stylesheet" href="../assets/css/animations.css" />
    <!-- Scripts for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="../assets/js/three-bg.js" defer></script>
    <script src="../assets/js/main.js" defer></script>
    <script src="../assets/js/svg-icons.js" defer></script>
    <link rel="icon" href="../assets/images/logo ico.svg" type="image/svg+xml" />

    <style>
      .tool-page-wrapper {
        padding: 50px 0;
        min-height: 80vh;
      }
      .tool-container {
        max-width: 1000px;
        margin: 40px auto;
        background: var(--card-bg);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        border: 1px solid rgba(var(--primary-rgb), 0.1);
        backdrop-filter: blur(10px);
      }

      .translation-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-top: 20px;
      }

      @media (max-width: 768px) {
        .translation-grid {
          grid-template-columns: 1fr;
        }
      }

      .input-group {
        margin-bottom: 25px;
        display: flex;
        flex-direction: column;
      }

      .input-group label {
        display: block;
        margin-bottom: 12px;
        font-weight: 700;
        color: var(--text-color);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .lang-select {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(var(--primary-rgb), 0.2);
        background: var(--bg-color);
        color: var(--text-color);
        font-family: 'Cairo', sans-serif;
        margin-bottom: 15px;
        cursor: pointer;
        outline: none;
        transition: border-color 0.3s;
      }

      .lang-select:focus {
        border-color: var(--primary-color);
      }

      textarea {
        width: 100%;
        height: 250px;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid rgba(var(--primary-rgb), 0.1);
        background: rgba(var(--primary-rgb), 0.02);
        color: var(--text-color);
        font-family: 'Cairo', sans-serif;
        font-size: 1.05rem;
        resize: none;
        outline: none;
        transition: all 0.3s ease;
        line-height: 1.6;
      }

      textarea:focus {
        border-color: var(--primary-color);
        background: var(--bg-color);
        box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.05);
      }

      .output-area {
        position: relative;
      }

      .output-area textarea {
        background: rgba(var(--secondary-purple-rgb), 0.02);
      }

      .translation-actions {
        display: flex;
        gap: 15px;
        margin-top: 20px;
        flex-wrap: wrap;
      }

      .btn-tool {
        flex: 1;
        min-width: 150px;
        padding: 15px;
        border-radius: 12px;
        border: none;
        background: var(--primary-color);
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        font-family: "Cairo", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-tool:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(var(--primary-rgb), 0.3);
      }

      .btn-tool.secondary {
        background: var(--secondary-purple);
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 15px;
      }

      .status-online {
        background: rgba(46, 213, 115, 0.1);
        color: #2ed573;
      }

      .copy-btn {
        position: absolute;
        bottom: 15px;
        left: 15px;
        background: var(--primary-color);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .copy-btn:hover {
        transform: scale(1.1);
      }

      .swap-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--card-bg);
        border: 1px solid rgba(var(--primary-rgb), 0.2);
        cursor: pointer;
        margin: 0 auto 20px;
        transition: all 0.3s;
        color: var(--primary-color);
      }

      .swap-btn:hover {
        transform: rotate(180deg);
        background: var(--primary-color);
        color: white;
      }

      #three-canvas-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }
      .tool-page-wrapper {
        position: relative;
        z-index: 2;
      }

      .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(var(--card-bg-rgb), 0.7);
        display: none;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        z-index: 5;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(var(--primary-rgb), 0.1);
        border-top: 4px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body class="theme-aware">
    <div class="grain-overlay"></div>
    <div id="three-canvas-container"></div>
    
    <header class="header">
      <div class="container">
        <div class="header-content">
          <div class="logo">
            <a href="../index.html">
              <img src="../assets/images/logo.svg" alt="Ali Ahmed" />
            </a>
          </div>
          <nav class="nav">
            <ul class="nav-links">
              <li><a href="../index.html#home">الرئيسية</a></li>
              <li><a href="index.html" class="active">أدواتنا</a></li>
              <li><a href="../works.html">أعمالنا</a></li>
              <li><a href="../index.html#contact">تواصل معنا</a></li>
            </ul>
          </nav>
          <div class="header-actions">
            <div class="theme-toggle" onclick="toggleTheme()">
              <svg class="svg-icon" viewBox="0 0 512 512">
                <use href="../assets/images/icons.svg#icon-moon"></use>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="tool-page-wrapper">
      <div class="container">
        <div class="tool-container">
          <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary-color); font-size: 2.2rem; margin-bottom: 10px;">أداة الترجمة الذكية</h1>
            <p style="color: var(--text-color-light);">ترجمة احترافية تدعم أكثر من 100 لغة بتقنيات متقدمة</p>
          </div>

          <div class="status-badge status-online">
            <i class="fas fa-bolt"></i>
            <span>محرك الترجمة نشط</span>
          </div>

          <div class="translation-grid">
            <!-- Input Side -->
            <div class="input-group">
              <label><i class="fas fa-language"></i> لغة المصدر</label>
              <select id="sourceLang" class="lang-select">
                <option value="auto">كشف تلقائي</option>
                <option value="ar">العربية</option>
                <option value="en" selected>الإنجليزية</option>
                <option value="fr">الفرنسية</option>
                <option value="es">الإسبانية</option>
                <option value="de">الألمانية</option>
                <option value="tr">التركية</option>
                <option value="zh">الصينية</option>
                <option value="ja">اليابانية</option>
                <option value="ru">الروسية</option>
              </select>
              <textarea id="sourceText" placeholder="اكتب النص هنا للترجمة..."></textarea>
            </div>

            <!-- Output Side -->
            <div class="input-group output-area">
              <label><i class="fas fa-globe"></i> لغة الهدف</label>
              <select id="targetLang" class="lang-select">
                <option value="ar" selected>العربية</option>
                <option value="en">الإنجليزية</option>
                <option value="fr">الفرنسية</option>
                <option value="es">الإسبانية</option>
                <option value="de">الألمانية</option>
                <option value="tr">التركية</option>
                <option value="zh">الصينية</option>
                <option value="ja">اليابانية</option>
                <option value="ru">الروسية</option>
              </select>
              <div id="outputArea" style="position: relative;">
                <textarea id="targetText" readonly placeholder="الترجمة ستظهر هنا..."></textarea>
                <button class="copy-btn" onclick="copyTranslation()" title="نسخ الترجمة">
                  <i class="fas fa-copy"></i>
                </button>
                <div id="loading" class="loading-overlay">
                  <div class="spinner"></div>
                </div>
              </div>
            </div>
          </div>

          <button class="swap-btn" onclick="swapLanguages()" title="تبديل اللغات">
            <i class="fas fa-exchange-alt"></i>
          </button>

          <div class="translation-actions">
            <button class="btn-tool" onclick="translateText()">
              <i class="fas fa-magic"></i> ترجمة الآن
            </button>
            <button class="btn-tool secondary" onclick="clearText()">
              <i class="fas fa-trash-alt"></i> مسح الكل
            </button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom">
          <p>جميع الحقوق محفوظة &copy; Ali Ahmed | أداة الترجمة الذكية</p>
        </div>
      </div>
    </footer>

    <script>
      async function translateText() {
        const text = document.getElementById('sourceText').value.trim();
        const source = document.getElementById('sourceLang').value;
        const target = document.getElementById('targetLang').value;
        const output = document.getElementById('targetText');
        const loading = document.getElementById('loading');

        if (!text) return;

        loading.style.display = 'flex';

        try {
          // Using a reliable free translation API concept (MyMemory or similar open-source friendly approach)
          const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`);
          const data = await response.json();
          
          if (data.responseData) {
             output.value = data.responseData.translatedText;
          } else {
             output.value = "حدث خطأ أثناء الترجمة. حاول مرة أخرى.";
          }
        } catch (error) {
          console.error(error);
          output.value = "فشل الاتصال بمحرك الترجمة.";
        } finally {
          loading.style.display = 'none';
        }
      }

      function swapLanguages() {
        const source = document.getElementById('sourceLang');
        const target = document.getElementById('targetLang');
        
        if (source.value === 'auto') return;
        
        const temp = source.value;
        source.value = target.value;
        target.value = temp;

        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const tempText = sourceText.value;
        sourceText.value = targetText.value;
        targetText.value = tempText;
      }

      function clearText() {
        document.getElementById('sourceText').value = '';
        document.getElementById('targetText').value = '';
      }

      function copyTranslation() {
        const text = document.getElementById('targetText').value;
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          alert('تم نسخ الترجمة بنجاح!');
        });
      }

      // Auto-translate on typing (optional enhancement)
      let timeout = null;
      document.getElementById('sourceText').addEventListener('input', () => {
        clearTimeout(timeout);
        timeout = setTimeout(translateText, 1000);
      });
    </script>
  </body>
</html>
